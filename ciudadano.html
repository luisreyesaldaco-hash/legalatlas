<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legal Atlas — Apolo</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html-docx-js/dist/html-docx.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lora', Georgia, serif;
      background: #1a1a16;
      color: rgba(245,237,216,0.88);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Topbar ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 28px;
      border-bottom: 1px solid rgba(196,154,60,0.22);
      background: #111110;
      flex-shrink: 0;
    }
    .topbar-logo {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      color: rgba(245,237,216,0.88);
    }
    .topbar-logo span { color: #c49a3c; font-weight: 400; }
    .apolo-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(245,237,216,0.4);
    }
    .apolo-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #c49a3c;
      box-shadow: 0 0 6px rgba(196,154,60,0.6);
    }
    .topbar-back {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.15em;
      color: rgba(245,237,216,0.35);
      text-decoration: none;
      text-transform: uppercase;
    }
    .topbar-back:hover { color: #c49a3c; }

    /* ── Selection bar ── */
    .selection-bar {
      flex-shrink: 0;
      background: #111110;
      border-bottom: 1px solid rgba(196,154,60,0.12);
      padding: 10px 28px;
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    .sel-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sel-label {
      font-family: 'Cinzel', serif;
      font-size: 8px;
      letter-spacing: 0.25em;
      color: rgba(196,154,60,0.45);
      text-transform: uppercase;
      white-space: nowrap;
    }
    .burbujas-wrap {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .burbuja {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 5px 12px;
      border: 1px solid rgba(196,154,60,0.3);
      background: transparent;
      color: rgba(196,154,60,0.7);
      cursor: pointer;
      transition: all 0.18s;
    }
    .burbuja:hover {
      border-color: #c49a3c;
      color: #c49a3c;
      background: rgba(196,154,60,0.06);
    }
    .burbuja.activa {
      background: #c49a3c;
      color: #111110;
      border-color: #c49a3c;
    }
    .selector-estado {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.12em;
      color: rgba(196,154,60,0.7);
      background: transparent;
      border: 1px solid rgba(196,154,60,0.3);
      padding: 5px 12px;
      cursor: pointer;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }
    .selector-estado:focus { border-color: #c49a3c; }
    .selector-estado option {
      background: #111110;
      color: rgba(245,237,216,0.88);
    }

    /* ── Mensajes ── */
    #mensajes {
      flex: 1;
      overflow-y: auto;
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      background: #f5f3ee;
    }

    .msg {
      max-width: 75%;
      font-size: 14px;
      line-height: 1.8;
      font-family: 'Lora', serif;
    }
    .msg-sender {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .msg-apolo {
      background: #ffffff;
      border: 1px solid #ddd8ce;
      border-radius: 2px 8px 8px 8px;
      padding: 16px 20px;
      align-self: flex-start;
      color: #1c1c18;
    }
    .msg-apolo .msg-sender { color: #c49a3c; }
    .msg-usuario {
      background: #242420;
      color: rgba(245,237,216,0.88);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px 2px 8px 8px;
      padding: 14px 18px;
      align-self: flex-end;
    }
    .msg-usuario .msg-sender { color: rgba(245,237,216,0.4); }

    /* Artículos citados */
    .articulos-citados {
      align-self: flex-start;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: -10px;
      padding-left: 4px;
    }
    .art-tag {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.1em;
      padding: 3px 10px;
      border: 1px solid rgba(196,154,60,0.3);
      background: rgba(196,154,60,0.06);
      color: #c49a3c;
    }

    /* Typing dots */
    .typing-dots { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
    .typing-dots span {
      width: 5px; height: 5px;
      background: #c49a3c;
      border-radius: 50%;
      opacity: 0.5;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30%            { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Input ── */
    .input-area {
      flex-shrink: 0;
      padding: 18px 28px;
      background: #ffffff;
      border-top: 1px solid #ddd8ce;
    }
    .input-row {
      display: flex;
      max-width: 760px;
      margin: 0 auto;
      background: #f5f3ee;
      border: 1px solid #ddd8ce;
      padding: 4px;
    }
    .input-row input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 12px 16px;
      font-size: 15px;
      font-family: 'Lora', serif;
      color: #1c1c18;
      outline: none;
    }
    .input-row input::placeholder { color: #6e6860; font-style: italic; }
    .input-row input:disabled::placeholder { color: #b0a898; }
    .btn-enviar {
      width: 46px; height: 46px;
      background: #1a1a16;
      color: #c49a3c;
      border: none;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .btn-enviar:hover { background: #c49a3c; color: #1a1a16; }
    .btn-enviar:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-redactar-inline {
      border-left: 1px solid rgba(196,154,60,0.2);
      font-size: 14px;
    }
    .btn-redactar-inline.activo { background: #c49a3c; color: #1a1a16; }

    /* ── Modo Redacción ── */
    .recetas-wrap { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn-generar {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 12px 24px;
      background: #c49a3c;
      color: #111110;
      border: none;
      cursor: pointer;
      transition: background 0.18s;
      margin-top: 10px;
      display: inline-block;
    }
    .btn-generar:hover:not(:disabled) { background: #d4ad50; }
    .btn-generar:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn-docx {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 10px 20px;
      background: #1a1a16;
      color: #c49a3c;
      border: 1px solid #c49a3c;
      cursor: pointer;
      transition: all 0.18s;
      margin-top: 10px;
      display: inline-block;
    }
    .btn-docx:hover { background: #c49a3c; color: #1a1a16; }
    .doc-container {
      background: #ffffff;
      border: 1px solid #ddd8ce;
      padding: 28px 32px;
      color: #1c1c18;
      font-family: 'Lora', serif;
      font-size: 14px;
      line-height: 1.8;
    }
    .nota-legal {
      font-size: 11px;
      font-style: italic;
      color: #7a7060;
      margin-top: 10px;
      padding: 8px 12px;
      border-left: 2px solid rgba(196,154,60,0.4);
      background: rgba(196,154,60,0.04);
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-logo">LEGAL<span>ATLAS</span></div>
    <div class="apolo-badge">
      <div class="apolo-dot"></div>
      APOLO · Motor normativo
    </div>
    <a href="index.html" class="topbar-back">← Inicio</a>
  </div>

  <div class="selection-bar">
    <div class="sel-group">
      <span class="sel-label">Selecciona un país</span>
      <div class="burbujas-wrap" id="paises-wrap">
        <span style="font-family:'Cinzel',serif;font-size:9px;color:rgba(196,154,60,0.4);letter-spacing:0.1em;">Cargando...</span>
      </div>
    </div>
    <div class="sel-group" id="grupo-materia" style="display:none">
      <span class="sel-label">Área legal →</span>
      <div class="burbujas-wrap" id="burbujas-wrap"></div>
    </div>
    <div class="sel-group" id="grupo-estado" style="display:none">
      <span class="sel-label">Estado</span>
      <select id="selector-estado" class="selector-estado">
        <option value="">Selecciona tu estado...</option>
      </select>
    </div>
    <div class="sel-group" id="grupo-recetas" style="display:none">
      <span class="sel-label">Documento</span>
      <div class="recetas-wrap" id="recetas-wrap">
        <span style="font-family:'Cinzel',serif;font-size:9px;color:rgba(196,154,60,0.4);letter-spacing:0.1em;">Cargando...</span>
      </div>
    </div>
  </div>

  <div id="mensajes"></div>

  <div class="input-area">
    <div class="input-row">
      <input type="text" id="pregunta" placeholder="Primero selecciona un área legal arriba…" autocomplete="off" disabled>
      <button class="btn-enviar" id="enviar" disabled title="Enviar">&#9658;</button>
      <button class="btn-enviar btn-redactar-inline" id="btn-modo-redaccion" title="Modo Redacción — redacta un documento con precisión jurídica">✍</button>
    </div>
  </div>

  <script>
    const mensajesEl   = document.getElementById('mensajes');
    const inputEl      = document.getElementById('pregunta');
    const btnEnviar    = document.getElementById('enviar');
    const paisesWrap   = document.getElementById('paises-wrap');
    const grupoMateria = document.getElementById('grupo-materia');
    const burbujaWrap  = document.getElementById('burbujas-wrap');
    const grupoEstado  = document.getElementById('grupo-estado');
    const selectorEst  = document.getElementById('selector-estado');

    let sel = { materia: null, ley: null, pais: null, estado: null, requiereEstado: false };
    let todasLasMaterias = [];

    // Country display names (browser-native i18n)
    const displayNames = new Intl.DisplayNames(['es'], { type: 'region' });
    function nombrePais(iso) {
      try { return displayNames.of(iso); } catch { return iso; }
    }

    // ── Helpers de mensajes ──────────────────────────────────────────────────
    function agregarMensaje(tipo, html) {
      const div = document.createElement('div');
      div.className = 'msg msg-' + tipo;
      const sender = tipo === 'apolo' ? 'APOLO' : 'TÚ';
      div.innerHTML = '<div class="msg-sender">' + sender + '</div>' + html;
      mensajesEl.appendChild(div);
      mensajesEl.scrollTop = mensajesEl.scrollHeight;
    }

    function mostrarArticulos(articulos) {
      if (!articulos || !articulos.length) return;
      const div = document.createElement('div');
      div.className = 'articulos-citados';
      div.innerHTML = articulos.map(n => '<span class="art-tag">Art. ' + n + '</span>').join('');
      mensajesEl.appendChild(div);
      mensajesEl.scrollTop = mensajesEl.scrollHeight;
    }

    function agregarTyping() {
      const div = document.createElement('div');
      div.id = 'typing';
      div.className = 'msg msg-apolo';
      div.innerHTML = '<div class="msg-sender">APOLO</div><div class="typing-dots"><span></span><span></span><span></span></div>';
      mensajesEl.appendChild(div);
      mensajesEl.scrollTop = mensajesEl.scrollHeight;
    }

    function quitarTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    // ── Saludo dinámico ──────────────────────────────────────────────────────
    function verificarListo() {
      const listo = sel.pais && sel.materia && (!sel.requiereEstado || sel.estado);
      inputEl.disabled   = !listo;
      btnEnviar.disabled = !listo;
      inputEl.placeholder = listo ? 'Escribe tu consulta legal…' : 'Selecciona país y área legal arriba…';
    }

    function saludoInicial() {
      mensajesEl.innerHTML = '';
      if (!sel.pais) {
        agregarMensaje('apolo', 'Soy <strong>Apolo</strong>, tu asistente legal.<br>Selecciona el <strong>país</strong> para comenzar.');
        return;
      }
      if (!sel.materia) {
        agregarMensaje('apolo', 'País: <strong>' + nombrePais(sel.pais) + '</strong>.<br>Ahora selecciona el <strong>área legal</strong>.');
        return;
      }
      if (sel.requiereEstado && !sel.estado) {
        agregarMensaje('apolo', 'Área: <strong>' + sel.materia + '</strong>.<br>Ahora selecciona tu <strong>estado</strong>.');
        return;
      }
      const jurisdiccion = sel.estado
        ? 'el <strong>' + sel.ley + ' de ' + sel.estado + '</strong>'
        : '<strong>' + sel.ley + '</strong> (' + nombrePais(sel.pais) + ')';
      agregarMensaje('apolo', 'Soy <strong>Apolo</strong>, tu asistente legal.<br>Consulto ' + jurisdiccion + ' y te cito el artículo exacto. ¿Cuál es tu duda?');
    }

    // ── Carga dinámica de países y materias ─────────────────────────────────
    async function cargarPaises() {
      try {
        const res = await fetch('/api/materias');
        todasLasMaterias = await res.json();
        const paisesUnicos = [...new Set(todasLasMaterias.map(m => m.pais))].filter(Boolean);
        paisesWrap.innerHTML = '';
        paisesUnicos.forEach(iso => {
          const btn = document.createElement('button');
          btn.className = 'burbuja';
          btn.textContent = nombrePais(iso);
          btn.dataset.pais = iso;
          btn.addEventListener('click', () => seleccionarPais(iso));
          paisesWrap.appendChild(btn);
        });
      } catch (e) {
        paisesWrap.innerHTML = '<span style="font-family:Cinzel,serif;font-size:9px;color:rgba(196,154,60,0.4);">Error cargando países</span>';
      }
    }

    function seleccionarPais(iso) {
      document.querySelectorAll('#paises-wrap .burbuja').forEach(b => b.classList.remove('activa'));
      paisesWrap.querySelector('[data-pais="' + iso + '"]').classList.add('activa');

      sel.pais    = iso;
      sel.materia = null;
      sel.ley     = null;
      sel.estado  = null;

      grupoEstado.style.display = 'none';
      selectorEst.value = '';

      // Agrupar por materia (puede haber varias leyes por materia)
      const materiasDelPais = todasLasMaterias.filter(m => m.pais === iso);
      const agrupadas = {};
      materiasDelPais.forEach(m => {
        if (!agrupadas[m.materia]) agrupadas[m.materia] = { ...m, leyes: [m.ley] };
        else agrupadas[m.materia].leyes.push(m.ley);
      });

      burbujaWrap.innerHTML = '';
      Object.values(agrupadas).forEach(m => {
        const btn = document.createElement('button');
        btn.className = 'burbuja';
        btn.textContent = m.materia;
        btn.dataset.materia = m.materia;
        btn.addEventListener('click', () => seleccionarMateria(m));
        burbujaWrap.appendChild(btn);
      });
      grupoMateria.style.display = 'flex';

      verificarListo();
      saludoInicial();
    }

    function seleccionarMateria(m) {
      document.querySelectorAll('#burbujas-wrap .burbuja').forEach(b => b.classList.remove('activa'));
      burbujaWrap.querySelector('[data-materia="' + m.materia + '"]').classList.add('activa');

      sel.materia        = m.materia;
      sel.ley            = m.leyes ? m.leyes[0] : m.ley;
      sel.leyes          = m.leyes || [m.ley];
      sel.estado         = null;
      sel.requiereEstado = m.requiere_estado;
      sel._estados       = m.estados || [];

      selectorEst.value = '';
      if (m.requiere_estado && sel._estados.length) {
        selectorEst.innerHTML = '<option value="">Selecciona tu estado...</option>';
        sel._estados.forEach(e => {
          const opt = document.createElement('option');
          opt.value = e; opt.textContent = e;
          selectorEst.appendChild(opt);
        });
        grupoEstado.style.display = 'flex';
      } else {
        grupoEstado.style.display = 'none';
      }

      verificarListo();
      saludoInicial();
    }

    selectorEst.addEventListener('change', function () {
      sel.estado = this.value;
      verificarListo();
      saludoInicial();
    });

    // ── Envío de consulta ────────────────────────────────────────────────────
    async function enviar() {
      // En modo redacción, capturar respuesta para la pregunta actual
      if (modoActual === 'redaccion' && recetaActiva && preguntaIdxActual < todasLasPreguntas.length) {
        const texto = inputEl.value.trim();
        if (!texto) return;
        inputEl.value   = '';
        inputEl.disabled   = true;
        btnEnviar.disabled = true;
        agregarMensaje('usuario', texto);
        const pregunta = todasLasPreguntas[preguntaIdxActual];
        datosRedaccion[pregunta.campo] = texto;
        preguntaIdxActual++;
        setTimeout(preguntarSiguiente, 300);
        return;
      }

      const texto = inputEl.value.trim();
      if (!texto) return;

      inputEl.value = '';
      btnEnviar.disabled = true;
      agregarMensaje('usuario', texto);
      agregarTyping();

      try {
        const res = await fetch('/api/asesoria', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            pregunta: texto,
            estado:   sel.estado || '',
            pais:     sel.pais   || '',
            tema:     sel.materia || 'civil',
            fuente:   sel.ley    || '',
            modo:     'consulta'
          })
        });

        quitarTyping();
        if (!res.ok) throw new Error('HTTP ' + res.status);

        const data = await res.json();
        const r = data.respuesta;
        agregarMensaje('apolo', r.draftHtml || r.resumen || 'Sin respuesta.');
        mostrarArticulos(r.articulos);

      } catch (err) {
        quitarTyping();
        agregarMensaje('apolo', 'Error al conectar con el motor: ' + err.message);
      }

      btnEnviar.disabled = false;
      inputEl.focus();
    }

    btnEnviar.addEventListener('click', enviar);
    inputEl.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
    });

    // ── Modo Redacción ────────────────────────────────────────────────────────
    let modoActual        = 'consulta';
    let recetaActiva      = null;
    let datosRedaccion    = {};
    let preguntaIdxActual = 0;
    let todasLasPreguntas = [];

    const btnModoRed  = document.getElementById('btn-modo-redaccion');
    const grupoRecetas = document.getElementById('grupo-recetas');
    const recetasWrap  = document.getElementById('recetas-wrap');

    btnModoRed.addEventListener('click', function () {
      if (modoActual === 'consulta') activarModoRedaccion();
      else activarModoConsulta();
    });

    function activarModoRedaccion() {
      modoActual = 'redaccion';
      btnModoRed.classList.add('activo');
      btnModoRed.title = 'Volver al modo consulta';
      grupoRecetas.style.display = 'flex';
      recetaActiva = null; datosRedaccion = {}; preguntaIdxActual = 0;
      inputEl.disabled = true; btnEnviar.disabled = true;
      mensajesEl.innerHTML = '';
      agregarMensaje('apolo', 'Modo Redacción activado. Selecciona el tipo de documento que necesitas generar.');
      cargarRecetas();
    }

    function activarModoConsulta() {
      modoActual = 'consulta';
      btnModoRed.classList.remove('activo');
      btnModoRed.title = 'Modo Redacción — redacta un documento con precisión jurídica';
      grupoRecetas.style.display = 'none';
      recetaActiva = null; datosRedaccion = {};
      saludoInicial();
      verificarListo();
    }

    async function cargarRecetas() {
      try {
        const res  = await fetch('/api/redactar');
        const lista = await res.json();
        recetasWrap.innerHTML = '';
        lista.forEach(r => {
          const btn = document.createElement('button');
          btn.className = 'burbuja';
          btn.textContent = r.titulo;
          btn.dataset.tipo = r.tipo;
          btn.addEventListener('click', () => seleccionarReceta(r.tipo));
          recetasWrap.appendChild(btn);
        });
      } catch (e) {
        recetasWrap.innerHTML = '<span style="font-family:Cinzel,serif;font-size:9px;color:rgba(196,154,60,0.4);">Error cargando documentos</span>';
      }
    }

    async function seleccionarReceta(tipo) {
      recetasWrap.querySelectorAll('.burbuja').forEach(b => b.classList.remove('activa'));
      recetasWrap.querySelector(`[data-tipo="${tipo}"]`)?.classList.add('activa');
      try {
        const res = await fetch('/api/redactar?tipo=' + tipo);
        recetaActiva = await res.json();
        datosRedaccion = {}; preguntaIdxActual = 0;
        todasLasPreguntas = [
          ...(recetaActiva.datos_requeridos     || []),
          ...(recetaActiva.preguntas_profundidad || [])
        ];
        agregarMensaje('apolo',
          'Perfecto. Voy a redactar una <strong>' + recetaActiva.titulo + '</strong>.<br>' +
          'Necesito algunos datos. Responde las siguientes preguntas y al final generamos el documento.'
        );
        setTimeout(preguntarSiguiente, 400);
      } catch (e) {
        agregarMensaje('apolo', 'Error cargando el documento: ' + e.message);
      }
    }

    function preguntarSiguiente() {
      if (preguntaIdxActual >= todasLasPreguntas.length) {
        mostrarBotonGenerar();
        return;
      }
      const p = todasLasPreguntas[preguntaIdxActual];
      const esOp = p.opcional
        ? '<br><em style="opacity:0.45;font-size:12px;">(opcional — escribe "no" para omitir)</em>'
        : '';
      agregarMensaje('apolo',
        '<strong>' + p.pregunta + '</strong>' + esOp +
        '<br><em style="opacity:0.4;font-size:12px;">Ej: ' + (p.ejemplo || '...') + '</em>'
      );
      inputEl.disabled   = false;
      btnEnviar.disabled = false;
      inputEl.placeholder = 'Escribe tu respuesta…';
      inputEl.focus();
    }

    function mostrarBotonGenerar() {
      const div = document.createElement('div');
      div.className = 'msg msg-apolo';
      div.innerHTML =
        '<div class="msg-sender">APOLO</div>' +
        '<p>Tengo todos los datos. Haz clic para generar tu documento.</p>' +
        '<button class="btn-generar" id="btn-generar">Generar documento</button>';
      mensajesEl.appendChild(div);
      mensajesEl.scrollTop = mensajesEl.scrollHeight;
      inputEl.disabled   = true;
      btnEnviar.disabled = true;
      document.getElementById('btn-generar').addEventListener('click', generarDocumento);
    }

    async function generarDocumento() {
      const btnGen = document.getElementById('btn-generar');
      if (btnGen) { btnGen.disabled = true; btnGen.textContent = 'Generando…'; }
      agregarTyping();
      try {
        const res = await fetch('/api/redactar', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ tipo: recetaActiva.tipo, datos: datosRedaccion })
        });
        quitarTyping();
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        const div = document.createElement('div');
        div.className = 'msg msg-apolo';
        div.style.maxWidth = '720px';
        div.innerHTML =
          '<div class="msg-sender">APOLO — DOCUMENTO GENERADO</div>' +
          '<div class="doc-container" id="doc-generado">' + data.html + '</div>' +
          (data.nota ? '<div class="nota-legal">' + data.nota + '</div>' : '') +
          '<button class="btn-docx" id="btn-docx">⬇ Descargar DOCX</button>';
        mensajesEl.appendChild(div);
        mensajesEl.scrollTop = mensajesEl.scrollHeight;
        document.getElementById('btn-docx').addEventListener('click', descargarDOCX);
      } catch (err) {
        quitarTyping();
        agregarMensaje('apolo', 'Error generando el documento: ' + err.message);
        if (btnGen) { btnGen.disabled = false; btnGen.textContent = 'Reintentar'; }
      }
    }

    function descargarDOCX() {
      const docEl = document.getElementById('doc-generado');
      if (!docEl) { alert('Primero genera el documento.'); return; }
      const titulo = (recetaActiva?.titulo || 'documento').replace(/\s+/g, '_');
      const content = '<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body>' + docEl.innerHTML + '</body></html>';
      const blob = htmlDocx.asBlob(content);
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = titulo + '.docx';
      a.click();
      URL.revokeObjectURL(url);
    }

    // ── Init ─────────────────────────────────────────────────────────────────
    saludoInicial();
    cargarPaises();
  </script>

</body>
</html>
