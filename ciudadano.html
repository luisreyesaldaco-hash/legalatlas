<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legal Atlas — Apolo</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lora', Georgia, serif;
      background: #1a1a16;
      color: rgba(245,237,216,0.88);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Topbar ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 28px;
      border-bottom: 1px solid rgba(196,154,60,0.22);
      background: #111110;
      flex-shrink: 0;
    }
    .topbar-logo {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      color: rgba(245,237,216,0.88);
    }
    .topbar-logo span { color: #c49a3c; font-weight: 400; }
    .apolo-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(245,237,216,0.4);
    }
    .apolo-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #c49a3c;
      box-shadow: 0 0 6px rgba(196,154,60,0.6);
    }
    .territorio {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.15em;
      color: rgba(196,154,60,0.7);
      text-transform: uppercase;
      border: 1px solid rgba(196,154,60,0.2);
      padding: 4px 10px;
      background: transparent;
      cursor: pointer;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }
    .territorio option {
      background: #111110;
      color: rgba(245,237,216,0.88);
      font-family: 'Cinzel', serif;
      font-size: 11px;
    }
    .topbar-back {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.15em;
      color: rgba(245,237,216,0.35);
      text-decoration: none;
      text-transform: uppercase;
    }
    .topbar-back:hover { color: #c49a3c; }

    /* ── Mensajes ── */
    #mensajes {
      flex: 1;
      overflow-y: auto;
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      background: #f5f3ee;
    }

    .msg {
      max-width: 75%;
      font-size: 14px;
      line-height: 1.8;
      font-family: 'Lora', serif;
    }
    .msg-sender {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .msg-apolo {
      background: #ffffff;
      border: 1px solid #ddd8ce;
      border-radius: 2px 8px 8px 8px;
      padding: 16px 20px;
      align-self: flex-start;
      color: #1c1c18;
    }
    .msg-apolo .msg-sender { color: #c49a3c; }
    .msg-usuario {
      background: #242420;
      color: rgba(245,237,216,0.88);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px 2px 8px 8px;
      padding: 14px 18px;
      align-self: flex-end;
    }
    .msg-usuario .msg-sender { color: rgba(245,237,216,0.4); }

    /* Artículos citados */
    .articulos-citados {
      align-self: flex-start;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: -10px;
      padding-left: 4px;
    }
    .art-tag {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.1em;
      padding: 3px 10px;
      border: 1px solid rgba(196,154,60,0.3);
      background: rgba(196,154,60,0.06);
      color: #c49a3c;
    }

    /* Typing dots */
    .typing-dots { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
    .typing-dots span {
      width: 5px; height: 5px;
      background: #c49a3c;
      border-radius: 50%;
      opacity: 0.5;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30%            { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Input ── */
    .input-area {
      flex-shrink: 0;
      padding: 18px 28px;
      background: #ffffff;
      border-top: 1px solid #ddd8ce;
    }
    .input-row {
      display: flex;
      max-width: 760px;
      margin: 0 auto;
      background: #f5f3ee;
      border: 1px solid #ddd8ce;
      padding: 4px;
    }
    .input-row input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 12px 16px;
      font-size: 15px;
      font-family: 'Lora', serif;
      color: #1c1c18;
      outline: none;
    }
    .input-row input::placeholder { color: #6e6860; font-style: italic; }
    .btn-enviar {
      width: 46px; height: 46px;
      background: #1a1a16;
      color: #c49a3c;
      border: none;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .btn-enviar:hover { background: #c49a3c; color: #1a1a16; }
    .btn-enviar:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-logo">LEGAL<span>ATLAS</span></div>
    <div class="apolo-badge">
      <div class="apolo-dot"></div>
      APOLO · Motor normativo
    </div>
    <select class="territorio" id="selector-ley">
      <optgroup label="── FEDERAL ──">
        <option value="CPEUM" data-estado="" data-ley="Constitución Política de los Estados Unidos Mexicanos">📜 Constitución · México</option>
      </optgroup>
      <optgroup label="── CÓDIGOS CIVILES ──">
        <option value="Aguascalientes"   data-estado="Aguascalientes"   data-ley="Código Civil">📍 Aguascalientes · México</option>
        <option value="Baja California"  data-estado="Baja California"  data-ley="Código Civil">📍 Baja California · México</option>
        <option value="Baja California Sur" data-estado="Baja California Sur" data-ley="Código Civil">📍 Baja California Sur · México</option>
        <option value="Campeche"         data-estado="Campeche"         data-ley="Código Civil">📍 Campeche · México</option>
        <option value="Chiapas"          data-estado="Chiapas"          data-ley="Código Civil">📍 Chiapas · México</option>
        <option value="Chihuahua"        data-estado="Chihuahua"        data-ley="Código Civil">📍 Chihuahua · México</option>
        <option value="Ciudad de México" data-estado="Ciudad de México" data-ley="Código Civil">📍 Ciudad de México · México</option>
        <option value="Coahuila"         data-estado="Coahuila"         data-ley="Código Civil">📍 Coahuila · México</option>
        <option value="Colima"           data-estado="Colima"           data-ley="Código Civil">📍 Colima · México</option>
        <option value="Durango"          data-estado="Durango"          data-ley="Código Civil">📍 Durango · México</option>
        <option value="Guanajuato"       data-estado="Guanajuato"       data-ley="Código Civil">📍 Guanajuato · México</option>
        <option value="Guerrero"         data-estado="Guerrero"         data-ley="Código Civil">📍 Guerrero · México</option>
        <option value="Hidalgo"          data-estado="Hidalgo"          data-ley="Código Civil">📍 Hidalgo · México</option>
        <option value="Jalisco"          data-estado="Jalisco"          data-ley="Código Civil">📍 Jalisco · México</option>
        <option value="Michoacán"        data-estado="Michoacán"        data-ley="Código Civil">📍 Michoacán · México</option>
        <option value="Nayarit"          data-estado="Nayarit"          data-ley="Código Civil">📍 Nayarit · México</option>
        <option value="Nuevo León"       data-estado="Nuevo León"       data-ley="Código Civil">📍 Nuevo León · México</option>
        <option value="Oaxaca"           data-estado="Oaxaca"           data-ley="Código Civil">📍 Oaxaca · México</option>
        <option value="Puebla"           data-estado="Puebla"           data-ley="Código Civil" selected>📍 Puebla · México</option>
        <option value="Querétaro"        data-estado="Querétaro"        data-ley="Código Civil">📍 Querétaro · México</option>
        <option value="San Luis Potosí"  data-estado="San Luis Potosí"  data-ley="Código Civil">📍 San Luis Potosí · México</option>
        <option value="Sinaloa"          data-estado="Sinaloa"          data-ley="Código Civil">📍 Sinaloa · México</option>
        <option value="Sonora"           data-estado="Sonora"           data-ley="Código Civil">📍 Sonora · México</option>
        <option value="Tamaulipas"       data-estado="Tamaulipas"       data-ley="Código Civil">📍 Tamaulipas · México</option>
        <option value="Veracruz"         data-estado="Veracruz"         data-ley="Código Civil">📍 Veracruz · México</option>
        <option value="Yucatán"          data-estado="Yucatán"          data-ley="Código Civil">📍 Yucatán · México</option>
        <option value="Zacatecas"        data-estado="Zacatecas"        data-ley="Código Civil">📍 Zacatecas · México</option>
      </optgroup>
    </select>
    <a href="index.html" class="topbar-back">← Inicio</a>
  </div>

  <div id="mensajes"></div>

  <div class="input-area">
    <div class="input-row">
      <input type="text" id="pregunta" placeholder="Escribe tu consulta legal…" autocomplete="off">
      <button class="btn-enviar" id="enviar" title="Enviar">&#9658;</button>
    </div>
  </div>

  <script>
    const mensajesEl  = document.getElementById('mensajes');
    const inputEl     = document.getElementById('pregunta');
    const btnEnviar   = document.getElementById('enviar');
    const selectorLey = document.getElementById('selector-ley');

    function getSeleccion() {
      const opt = selectorLey.options[selectorLey.selectedIndex];
      return {
        estado: opt.dataset.estado || '',
        ley:    opt.dataset.ley    || 'Código Civil',
        label:  opt.textContent.trim()
      };
    }

    function agregarMensaje(tipo, html) {
      const div = document.createElement('div');
      div.className = 'msg msg-' + tipo;
      const sender = tipo === 'apolo' ? 'APOLO' : 'TÚ';
      div.innerHTML = '<div class="msg-sender">' + sender + '</div>' + html;
      mensajesEl.appendChild(div);
      mensajesEl.scrollTop = mensajesEl.scrollHeight;
    }

    function mostrarArticulos(articulos, fuentes) {
      if (!articulos || !articulos.length) return;
      const div = document.createElement('div');
      div.className = 'articulos-citados';
      div.innerHTML = articulos.map(n =>
        '<span class="art-tag">Art. ' + n + '</span>'
      ).join('');
      mensajesEl.appendChild(div);
      mensajesEl.scrollTop = mensajesEl.scrollHeight;
    }

    function agregarTyping() {
      const div = document.createElement('div');
      div.id = 'typing';
      div.className = 'msg msg-apolo';
      div.innerHTML = '<div class="msg-sender">APOLO</div><div class="typing-dots"><span></span><span></span><span></span></div>';
      mensajesEl.appendChild(div);
      mensajesEl.scrollTop = mensajesEl.scrollHeight;
    }

    function quitarTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    async function enviar() {
      const texto = inputEl.value.trim();
      if (!texto) return;

      inputEl.value = '';
      btnEnviar.disabled = true;
      agregarMensaje('usuario', texto);
      agregarTyping();

      try {
        const sel = getSeleccion();
        const res = await fetch('/api/asesoria', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            pregunta: texto,
            estado:   sel.estado,
            pais:     'México',
            tema:     'civil',
            fuente:   sel.ley,
            modo:     'consulta'
          })
        });

        quitarTyping();

        if (!res.ok) throw new Error('HTTP ' + res.status);

        const data = await res.json();
        const r = data.respuesta;

        agregarMensaje('apolo', r.draftHtml || r.resumen || 'Sin respuesta.');
        mostrarArticulos(r.articulos, r.fuentes);

      } catch (err) {
        quitarTyping();
        agregarMensaje('apolo', 'Error al conectar con el motor: ' + err.message);
      }

      btnEnviar.disabled = false;
      inputEl.focus();
    }

    btnEnviar.addEventListener('click', enviar);
    inputEl.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
    });

    function saludoInicial() {
      const sel = getSeleccion();
      const fuente = sel.estado
        ? `el Código Civil de <strong>${sel.estado}</strong>`
        : `la <strong>Constitución Política de los Estados Unidos Mexicanos</strong>`;
      mensajesEl.innerHTML = '';
      agregarMensaje('apolo', `Soy <strong>Apolo</strong>, tu asistente legal.<br>Consulto ${fuente} y te cito el artículo exacto. ¿Cuál es tu duda?`);
    }

    selectorLey.addEventListener('change', saludoInicial);
    saludoInicial();
  </script>

</body>
</html>
