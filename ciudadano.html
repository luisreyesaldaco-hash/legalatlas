<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legal Atlas — Apolo</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lora', Georgia, serif;
      background: #1a1a16;
      color: rgba(245,237,216,0.88);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Topbar ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 28px;
      border-bottom: 1px solid rgba(196,154,60,0.22);
      background: #111110;
      flex-shrink: 0;
    }
    .topbar-logo {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      color: rgba(245,237,216,0.88);
    }
    .topbar-logo span { color: #c49a3c; font-weight: 400; }
    .apolo-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(245,237,216,0.4);
    }
    .apolo-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #c49a3c;
      box-shadow: 0 0 6px rgba(196,154,60,0.6);
    }
    .topbar-back {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.15em;
      color: rgba(245,237,216,0.35);
      text-decoration: none;
      text-transform: uppercase;
    }
    .topbar-back:hover { color: #c49a3c; }

    /* ── Selection bar ── */
    .selection-bar {
      flex-shrink: 0;
      background: #111110;
      border-bottom: 1px solid rgba(196,154,60,0.12);
      padding: 10px 28px;
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    .sel-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sel-label {
      font-family: 'Cinzel', serif;
      font-size: 8px;
      letter-spacing: 0.25em;
      color: rgba(196,154,60,0.45);
      text-transform: uppercase;
      white-space: nowrap;
    }
    .burbujas-wrap {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .burbuja {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 5px 12px;
      border: 1px solid rgba(196,154,60,0.3);
      background: transparent;
      color: rgba(196,154,60,0.7);
      cursor: pointer;
      transition: all 0.18s;
    }
    .burbuja:hover {
      border-color: #c49a3c;
      color: #c49a3c;
      background: rgba(196,154,60,0.06);
    }
    .burbuja.activa {
      background: #c49a3c;
      color: #111110;
      border-color: #c49a3c;
    }
    .selector-estado {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.12em;
      color: rgba(196,154,60,0.7);
      background: transparent;
      border: 1px solid rgba(196,154,60,0.3);
      padding: 5px 12px;
      cursor: pointer;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }
    .selector-estado:focus { border-color: #c49a3c; }
    .selector-estado option {
      background: #111110;
      color: rgba(245,237,216,0.88);
    }

    /* ── Mensajes ── */
    #mensajes {
      flex: 1;
      overflow-y: auto;
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      background: #f5f3ee;
    }

    .msg {
      max-width: 75%;
      font-size: 14px;
      line-height: 1.8;
      font-family: 'Lora', serif;
    }
    .msg-sender {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .msg-apolo {
      background: #ffffff;
      border: 1px solid #ddd8ce;
      border-radius: 2px 8px 8px 8px;
      padding: 16px 20px;
      align-self: flex-start;
      color: #1c1c18;
    }
    .msg-apolo .msg-sender { color: #c49a3c; }
    .msg-usuario {
      background: #242420;
      color: rgba(245,237,216,0.88);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px 2px 8px 8px;
      padding: 14px 18px;
      align-self: flex-end;
    }
    .msg-usuario .msg-sender { color: rgba(245,237,216,0.4); }

    /* Artículos citados */
    .articulos-citados {
      align-self: flex-start;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: -10px;
      padding-left: 4px;
    }
    .art-tag {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.1em;
      padding: 3px 10px;
      border: 1px solid rgba(196,154,60,0.3);
      background: rgba(196,154,60,0.06);
      color: #c49a3c;
    }

    /* Typing dots */
    .typing-dots { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
    .typing-dots span {
      width: 5px; height: 5px;
      background: #c49a3c;
      border-radius: 50%;
      opacity: 0.5;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30%            { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Input ── */
    .input-area {
      flex-shrink: 0;
      padding: 18px 28px;
      background: #ffffff;
      border-top: 1px solid #ddd8ce;
    }
    .input-row {
      display: flex;
      max-width: 760px;
      margin: 0 auto;
      background: #f5f3ee;
      border: 1px solid #ddd8ce;
      padding: 4px;
    }
    .input-row input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 12px 16px;
      font-size: 15px;
      font-family: 'Lora', serif;
      color: #1c1c18;
      outline: none;
    }
    .input-row input::placeholder { color: #6e6860; font-style: italic; }
    .input-row input:disabled::placeholder { color: #b0a898; }
    .btn-enviar {
      width: 46px; height: 46px;
      background: #1a1a16;
      color: #c49a3c;
      border: none;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .btn-enviar:hover { background: #c49a3c; color: #1a1a16; }
    .btn-enviar:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-logo">LEGAL<span>ATLAS</span></div>
    <div class="apolo-badge">
      <div class="apolo-dot"></div>
      APOLO · Motor normativo
    </div>
    <a href="index.html" class="topbar-back">← Inicio</a>
  </div>

  <div class="selection-bar">
    <div class="sel-group">
      <span class="sel-label">Área legal</span>
      <div class="burbujas-wrap" id="burbujas-wrap">
        <span style="font-family:'Cinzel',serif;font-size:9px;color:rgba(196,154,60,0.4);letter-spacing:0.1em;">Cargando...</span>
      </div>
    </div>
    <div class="sel-group" id="grupo-pais" style="display:none">
      <span class="sel-label">País</span>
      <select id="selector-pais" class="selector-estado">
        <option value="">Selecciona un país...</option>
        <option value="México">México</option>
      </select>
    </div>
    <div class="sel-group" id="grupo-estado" style="display:none">
      <span class="sel-label">Estado</span>
      <select id="selector-estado" class="selector-estado">
        <option value="">Selecciona tu estado...</option>
      </select>
    </div>
  </div>

  <div id="mensajes"></div>

  <div class="input-area">
    <div class="input-row">
      <input type="text" id="pregunta" placeholder="Primero selecciona un área legal arriba…" autocomplete="off" disabled>
      <button class="btn-enviar" id="enviar" disabled title="Enviar">&#9658;</button>
    </div>
  </div>

  <script>
    const mensajesEl   = document.getElementById('mensajes');
    const inputEl      = document.getElementById('pregunta');
    const btnEnviar    = document.getElementById('enviar');
    const burbujaWrap  = document.getElementById('burbujas-wrap');
    const grupoPais    = document.getElementById('grupo-pais');
    const selectorPais = document.getElementById('selector-pais');
    const grupoEstado  = document.getElementById('grupo-estado');
    const selectorEst  = document.getElementById('selector-estado');

    let sel = { materia: null, ley: null, pais: null, estado: null, requiereEstado: true };

    // ── Helpers de mensajes ──────────────────────────────────────────────────
    function agregarMensaje(tipo, html) {
      const div = document.createElement('div');
      div.className = 'msg msg-' + tipo;
      const sender = tipo === 'apolo' ? 'APOLO' : 'TÚ';
      div.innerHTML = '<div class="msg-sender">' + sender + '</div>' + html;
      mensajesEl.appendChild(div);
      mensajesEl.scrollTop = mensajesEl.scrollHeight;
    }

    function mostrarArticulos(articulos) {
      if (!articulos || !articulos.length) return;
      const div = document.createElement('div');
      div.className = 'articulos-citados';
      div.innerHTML = articulos.map(n => '<span class="art-tag">Art. ' + n + '</span>').join('');
      mensajesEl.appendChild(div);
      mensajesEl.scrollTop = mensajesEl.scrollHeight;
    }

    function agregarTyping() {
      const div = document.createElement('div');
      div.id = 'typing';
      div.className = 'msg msg-apolo';
      div.innerHTML = '<div class="msg-sender">APOLO</div><div class="typing-dots"><span></span><span></span><span></span></div>';
      mensajesEl.appendChild(div);
      mensajesEl.scrollTop = mensajesEl.scrollHeight;
    }

    function quitarTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    // ── Saludo dinámico ──────────────────────────────────────────────────────
    function verificarListo() {
      const listo = sel.materia && sel.pais && (!sel.requiereEstado || sel.estado);
      inputEl.disabled   = !listo;
      btnEnviar.disabled = !listo;
      if (listo) inputEl.placeholder = 'Escribe tu consulta legal…';
    }

    function saludoInicial() {
      mensajesEl.innerHTML = '';
      if (!sel.materia) {
        agregarMensaje('apolo', 'Soy <strong>Apolo</strong>, tu asistente legal.<br>Selecciona el <strong>área legal</strong> para comenzar.');
        return;
      }
      if (!sel.pais) {
        agregarMensaje('apolo', 'Área: <strong>' + sel.materia + '</strong>.<br>Ahora selecciona el <strong>país</strong>.');
        return;
      }
      if (sel.requiereEstado && !sel.estado) {
        agregarMensaje('apolo', 'País: <strong>' + sel.pais + '</strong>.<br>Ahora selecciona tu <strong>estado</strong>.');
        return;
      }
      const jurisdiccion = sel.estado
        ? 'el <strong>' + sel.ley + ' de ' + sel.estado + '</strong> + la Constitución'
        : 'la <strong>Constitución Política de los Estados Unidos Mexicanos</strong>';
      agregarMensaje('apolo', 'Soy <strong>Apolo</strong>, tu asistente legal.<br>Consulto ' + jurisdiccion + ' y te cito el artículo exacto. ¿Cuál es tu duda?');
    }

    // ── Carga dinámica de materias ───────────────────────────────────────────
    async function cargarMaterias() {
      try {
        const res = await fetch('/api/materias');
        const materias = await res.json();
        renderBurbujas(materias);
      } catch (e) {
        burbujaWrap.innerHTML = '<span style="font-family:Cinzel,serif;font-size:9px;color:rgba(196,154,60,0.4);">Error cargando áreas</span>';
      }
    }

    function renderBurbujas(materias) {
      burbujaWrap.innerHTML = '';
      materias.forEach(m => {
        const btn = document.createElement('button');
        btn.className = 'burbuja';
        btn.textContent = m.materia;
        btn.dataset.materia = m.materia;
        btn.addEventListener('click', () => seleccionarMateria(m));
        burbujaWrap.appendChild(btn);
      });
    }

    function seleccionarMateria(m) {
      document.querySelectorAll('.burbuja').forEach(b => b.classList.remove('activa'));
      burbujaWrap.querySelector('[data-materia="' + m.materia + '"]').classList.add('activa');

      sel.materia        = m.materia;
      sel.ley            = m.ley;
      sel.pais           = null;
      sel.estado         = null;
      sel.requiereEstado = m.requiere_estado;
      sel._estados       = m.estados || [];

      // Resetear pasos siguientes
      selectorPais.value = '';
      selectorEst.value  = '';
      grupoEstado.style.display = 'none';
      grupoPais.style.display   = 'flex';

      verificarListo();
      saludoInicial();
    }

    selectorPais.addEventListener('change', function () {
      sel.pais   = this.value;
      sel.estado = null;
      selectorEst.value = '';

      if (this.value && sel.requiereEstado) {
        // Poblar estados y mostrar dropdown
        selectorEst.innerHTML = '<option value="">Selecciona tu estado...</option>';
        sel._estados.forEach(e => {
          const opt = document.createElement('option');
          opt.value = e; opt.textContent = e;
          selectorEst.appendChild(opt);
        });
        grupoEstado.style.display = 'flex';
      } else {
        grupoEstado.style.display = 'none';
      }

      verificarListo();
      saludoInicial();
    });

    selectorEst.addEventListener('change', function () {
      sel.estado = this.value;
      verificarListo();
      saludoInicial();
    });

    // ── Envío de consulta ────────────────────────────────────────────────────
    async function enviar() {
      const texto = inputEl.value.trim();
      if (!texto) return;

      inputEl.value = '';
      btnEnviar.disabled = true;
      agregarMensaje('usuario', texto);
      agregarTyping();

      try {
        const res = await fetch('/api/asesoria', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            pregunta: texto,
            estado:   sel.estado || '',
            pais:     'México',
            tema:     sel.materia || 'civil',
            fuente:   sel.ley    || '',
            modo:     'consulta'
          })
        });

        quitarTyping();
        if (!res.ok) throw new Error('HTTP ' + res.status);

        const data = await res.json();
        const r = data.respuesta;
        agregarMensaje('apolo', r.draftHtml || r.resumen || 'Sin respuesta.');
        mostrarArticulos(r.articulos);

      } catch (err) {
        quitarTyping();
        agregarMensaje('apolo', 'Error al conectar con el motor: ' + err.message);
      }

      btnEnviar.disabled = false;
      inputEl.focus();
    }

    btnEnviar.addEventListener('click', enviar);
    inputEl.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
    });

    // ── Init ─────────────────────────────────────────────────────────────────
    saludoInicial();
    cargarMaterias();
  </script>

</body>
</html>
