<!DOCTYPE html>
<html lang="es">
<head>
<script>
(function(){
  var t = localStorage.getItem('la-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', t);
  // Sync lang from URL before i18n.js loads — eliminates flash
  var urlLang = new URLSearchParams(location.search).get('lang');
  if (urlLang && ['es','cs','fr','en'].includes(urlLang)) {
    localStorage.setItem('atlas_lang', urlLang);
    document.documentElement.style.opacity = '0';
    document.documentElement.style.transition = 'opacity 0.15s';
  }
})();
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legal Atlas — Apolo</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <script src="/locales/i18n.js"></script>
  <script src="https://unpkg.com/html-docx-js/dist/html-docx.js"></script>
  <style>
    :root {
      --bg-deep:        #F3EAD5;
      --bg-card:        #FAF2E0;
      --bg-elevated:    #EBE0C8;
      --bg-input:       #FAF2E0;
      --text-primary:   #1A1410;
      --text-secondary: #3D342A;
      --text-muted:     #7A6E60;
      --gold:           #8B6820;
      --gold-light:     #C49A3C;
      --gold-dim:       rgba(139,104,32,0.08);
      --gold-border:    rgba(139,104,32,0.22);
      --border:         #DDD0B4;
      --border-hover:   #C9BFB0;
      --shadow-sm:      0 1px 4px rgba(26,20,16,0.07);
      --shadow-md:      0 4px 20px rgba(26,20,16,0.10);
      --shadow-lg:      0 8px 40px rgba(26,20,16,0.13);
      /* compat aliases — mantener los que ya existen */
      --bg-raised:      var(--bg-elevated);
      --text:           var(--text-primary);
      --text-soft:      var(--text-secondary);
      --border-hov:     var(--border-hover);
      --accent:         var(--gold);
      --gold-glow:      rgba(139,104,32,0.25);
    }
    :root[data-theme="dark"] {
      --bg-deep:        #0C0C0A;
      --bg-card:        #141412;
      --bg-elevated:    #1C1C19;
      --bg-input:       #1C1C19;
      --text-primary:   #F0ECE4;
      --text-secondary: #D0C4B4;
      --text-muted:     #9C9082;
      --gold:           #C49A3C;
      --gold-light:     #D4AE58;
      --gold-dim:       rgba(196,154,60,0.10);
      --gold-border:    rgba(196,154,60,0.20);
      --border:         #2A2A26;
      --border-hover:   #3D3D38;
      --shadow-sm:      0 1px 4px rgba(0,0,0,0.25);
      --shadow-md:      0 4px 20px rgba(0,0,0,0.35);
      --shadow-lg:      0 8px 40px rgba(0,0,0,0.45);
      --bg-raised:      var(--bg-elevated);
      --text:           var(--text-primary);
      --text-soft:      var(--text-secondary);
      --border-hov:     var(--border-hover);
      --accent:         var(--gold);
      --gold-glow:      rgba(196,154,60,0.35);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--bg-deep);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Topbar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 0 28px;
      height: 58px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      flex-shrink: 0;
      position: relative;
      z-index: 50;
    }
    .topbar-logo {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      color: var(--text-primary);
    }
    .topbar-logo span { color: var(--gold); font-weight: 400; }
    .apolo-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .apolo-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 10px var(--gold-glow);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.7; transform: scale(0.88); }
    }
    .topbar-back {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .topbar-back:hover { color: var(--gold); }
    .topbar-nav { display: flex; gap: 24px; }
    .topbar-link {
    font-family: 'Cinzel', serif;
    font-size: 11.5px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text-secondary);
    text-decoration: none;
    transition: color 0.2s;
  }
    .topbar-link:hover { color: var(--gold); }
    .topbar-link.active { color: var(--gold); }
    .topbar-link-pro {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .pro-badge {
      font-family: 'Cinzel', serif;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--bg-deep);
      background: var(--gold);
      padding: 2px 6px;
      border-radius: 4px;
      line-height: 1.4;
    }

    /* ── Selection bar ── */
    .selection-bar {
      flex-shrink: 0;
      background: rgba(26,20,16,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(196,154,60,0.18);
      padding: 10px 28px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .sel-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sel-label {
      font-family: 'Cinzel', serif;
      font-size: 8px;
      letter-spacing: 0.25em;
      color: rgba(245,237,216,0.45);
      text-transform: uppercase;
      white-space: nowrap;
    }
    .burbujas-wrap {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .burbuja {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid rgba(245,237,216,0.2);
      background: rgba(245,237,216,0.06);
      color: rgba(245,237,216,0.75);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .burbuja:hover {
      border-color: rgba(196,154,60,0.6);
      color: #C49A3C;
      background: rgba(196,154,60,0.1);
    }
    .burbuja.activa {
      background: #C49A3C;
      color: #0E0A06;
      border-color: #C49A3C;
    }
    .selector-estado {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.1em;
      color: rgba(245,237,216,0.75);
      background: rgba(245,237,216,0.06);
      border: 1px solid rgba(245,237,216,0.2);
      border-radius: 20px;
      padding: 5px 14px;
      cursor: pointer;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      transition: border-color 0.2s;
    }
    .selector-estado:focus { border-color: rgba(196,154,60,0.6); }
    .selector-estado option { background: #1a1410; color: #F5EDD8; }

    /* ── Mensajes ── */
    #mensajes {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: #f5edd8;
    }
    #mensajes::-webkit-scrollbar { width: 4px; }
    #mensajes::-webkit-scrollbar-track { background: transparent; }
    #mensajes::-webkit-scrollbar-thumb { background: rgba(196,154,60,0.2); border-radius: 2px; }

    .msg {
      max-width: 75%;
      font-size: 14px;
      line-height: 1.8;
      font-family: 'Lora', serif;
    }
    .msg-sender {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .msg-apolo {
      background: rgba(255,255,255,0.45);
      border: 1px solid rgba(138,104,32,0.2);
      border-radius: 4px 18px 18px 18px;
      padding: 16px 20px;
      align-self: flex-start;
      color: #1a1508;
    }
    .msg-apolo .msg-sender { color: #8a6820; }
    .msg-usuario {
      background: rgba(138,104,32,0.12);
      color: #1a1508;
      border: 1px solid rgba(138,104,32,0.25);
      border-radius: 18px 4px 18px 18px;
      padding: 14px 18px;
      align-self: flex-end;
    }
    .msg-usuario .msg-sender { color: rgba(26,21,8,0.45); }

    /* Artículos citados */
    .articulos-citados {
      align-self: flex-start;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: -6px;
      padding-left: 4px;
    }
    .art-tag {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.1em;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid rgba(196,154,60,0.3);
      background: var(--gold-dim);
      color: var(--gold);
    }

    /* Typing dots */
    .typing-dots { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
    .typing-dots span {
      width: 5px; height: 5px;
      background: var(--gold);
      border-radius: 50%;
      opacity: 0.5;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30%            { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Input ── */
    .input-area {
      flex-shrink: 0;
      padding: 14px 24px 10px;
      background: rgba(250,242,224,0.75);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid var(--border);
    }
    [data-theme="dark"] .input-area {
      background: rgba(20,20,18,0.75);
    }
    .input-wrap {
      max-width: 760px;
      margin: 0 auto;
    }
    .input-row {
      display: flex;
      background: rgba(235,224,200,0.7);
      border: 1px solid rgba(139,104,32,0.18);
      border-radius: 14px;
      padding: 4px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      box-shadow: inset 0 2px 8px rgba(26,20,16,0.08), 0 4px 20px rgba(26,20,16,0.10);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .input-row:focus-within {
      border-color: var(--gold-border);
      box-shadow: inset 0 2px 8px rgba(26,20,16,0.08), 0 6px 28px rgba(26,20,16,0.14);
    }
    .input-row input {
      flex: 1;
      border: none;
      background: rgba(250,242,224,0.85);
      padding: 11px 16px;
      font-size: 14px;
      font-family: 'Lora', serif;
      color: var(--text);
      outline: none;
      border-radius: 10px;
    }
    [data-theme="dark"] .input-row {
      background: rgba(28,28,25,0.75);
      border-color: rgba(196,154,60,0.18);
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.25), 0 4px 20px rgba(0,0,0,0.35);
    }
    [data-theme="dark"] .input-row input {
      background: rgba(20,20,18,0.85);
      color: var(--text-primary);
    }
    .input-row input::placeholder { color: var(--text-muted); font-style: italic; }
    .input-row input:disabled { opacity: 0.4; }
    .btn-enviar {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: var(--gold);
      color: #fff;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }
    .btn-enviar svg { width: 16px; height: 16px; stroke: #fff; }
    .btn-enviar:hover:not(:disabled) { background: var(--gold-light); }
    .btn-enviar:disabled { opacity: 0.3; cursor: not-allowed; }
    .input-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
      gap: 12px;
    }
    .btn-modo-redaccion {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-modo-redaccion:hover { border-color: var(--gold-border); color: var(--gold); }
    .btn-modo-redaccion.activo { background: var(--gold-dim); border-color: var(--gold-border); color: var(--gold); }
    /* alias para JS que usa .activo en btn-redactar-inline */
    #btn-modo-redaccion.activo { background: var(--gold-dim); border-color: var(--gold-border); color: var(--gold); }
    .input-disclaimer {
      font-family: 'Cinzel', serif;
      font-size: 8px;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      opacity: 0.6;
      text-align: right;
      flex: 1;
    }

    /* ── Modo Redacción ── */
    .recetas-wrap { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn-generar {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 12px 26px;
      border-radius: 12px;
      background: var(--gold);
      color: #08080a;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 10px;
      display: inline-block;
    }
    .btn-generar:hover:not(:disabled) { background: var(--gold-light); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(196,154,60,0.25); }
    .btn-generar:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-docx {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 10px 22px;
      border-radius: 12px;
      background: transparent;
      color: var(--gold);
      border: 1px solid rgba(196,154,60,0.35);
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 10px;
      display: inline-block;
    }
    .btn-docx:hover { background: var(--gold-dim); border-color: var(--gold); }
    .doc-container {
      background: #ffffff;
      border: 1px solid #ddd8ce;
      border-radius: 12px;
      padding: 28px 32px;
      color: #1c1c18;
      font-family: 'Lora', serif;
      font-size: 14px;
      line-height: 1.8;
    }

    /* ── Preview con marca de agua ── */
    .doc-preview-wrap {
      position: relative;
    }
    .doc-preview-wrap .doc-container {
      opacity: 0.45;
      user-select: none;
      pointer-events: none;
    }
    .doc-watermark {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-30deg);
      font-family: 'Cinzel', serif;
      font-size: 18px;
      letter-spacing: 0.2em;
      color: rgba(196,154,60,0.55);
      white-space: nowrap;
      pointer-events: none;
      text-align: center;
      line-height: 1.8;
    }
    .nota-legal {
      font-size: 11px;
      font-style: italic;
      color: var(--text-muted);
      margin-top: 10px;
      padding: 10px 14px;
      border-radius: 8px;
      border-left: 2px solid rgba(196,154,60,0.4);
      background: var(--gold-dim);
    }
  
    /* ═══ THEME SYSTEM OVERRIDES ═══ */
    .topbar {
      background: var(--bg-card) !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      box-shadow: var(--shadow-sm);
      border-bottom: 1px solid var(--border);
    }
    [data-theme="dark"] .topbar {
      background: rgba(20,20,18,0.96) !important;
      backdrop-filter: blur(20px) !important;
      -webkit-backdrop-filter: blur(20px) !important;
    }
    .topbar-logo { color: var(--text-primary); }
    .topbar-link {
    font-family: 'Cinzel', serif;
    font-size: 11.5px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text-secondary);
    text-decoration: none;
    transition: color 0.2s;
  }
    .topbar-link:hover { color: var(--gold); }
    .topbar-link.active { color: var(--text-primary); font-weight: 600; }
    .topbar-link.active::after, .topbar-link:hover::after { background: var(--gold); }
    .topbar-status, .apolo-badge {
      background: rgba(146,112,42,0.08);
      border: 1px solid var(--gold-border);
      color: var(--gold);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 10px;
      letter-spacing: 0.15em;
    }
    [data-theme="dark"] .topbar-status, [data-theme="dark"] .apolo-badge {
      background: var(--gold-dim);
    }
    .status-dot, .apolo-dot {
      background: #22C55E;
      box-shadow: 0 0 6px rgba(34,197,94,0.5);
      animation: none !important;
    }
    [data-theme="dark"] .status-dot, [data-theme="dark"] .apolo-dot {
      background: var(--gold);
      box-shadow: 0 0 10px var(--gold-glow);
      animation: pulse-dot 2s ease-in-out infinite !important;
    }
    .ambient-orb { opacity: 0.04 !important; }
    [data-theme="dark"] .ambient-orb { opacity: 0.08 !important; }
    body { background: var(--bg-deep); color: var(--text-primary); }
    /* Cards */
    .art-card { box-shadow: var(--shadow-sm); border-left: 3px solid transparent; }
    .art-card:hover { box-shadow: var(--shadow-md); border-left-color: var(--gold); }
    .sintesis-card { box-shadow: var(--shadow-md); border-top: 3px solid var(--gold) !important; border-radius: 0 0 16px 16px !important; }
    .sintesis-card::before { display: none; }
    .art-score {
      background: var(--gold-dim);
      color: var(--gold);
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
    }
    .capitulo-tag {
      background: var(--bg-elevated);
      border: 1px solid var(--border-hover);
      color: var(--text-secondary);
    }
    [data-theme="dark"] .capitulo-tag { background: var(--gold-dim); color: var(--gold); }
    /* Inputs */
    .marco-textarea, .marco-select, .tree-select {
      background: var(--bg-input) !important;
      border-color: var(--border);
      color: var(--text-primary);
    }
    .marco-textarea:focus, .marco-select:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(146,112,42,0.12);
    }
    /* Main button */
    .marco-btn { background: var(--text-primary); color: var(--bg-card); box-shadow: var(--shadow-sm); }
    .marco-btn:hover:not(:disabled) { background: var(--gold); color: var(--bg-card); box-shadow: var(--shadow-md); }
    /* Nivel headers */
    .nivel-header { background: var(--bg-card); box-shadow: var(--shadow-sm); }
    .nivel-header:hover { background: var(--bg-elevated); box-shadow: var(--shadow-md); }
    /* Text */
    .sintesis-texto { color: var(--text-primary); }
    .sintesis-eyebrow { color: var(--gold); }
    /* Disclaimer */
    .disclaimer {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-top: 24px;
      padding: 14px 18px;
      background: rgba(146,112,42,0.06);
      border: 1px solid var(--gold-border);
      border-radius: 10px;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
    }
    .disclaimer-icono { flex-shrink: 0; font-size: 14px; }
    /* Tema toggle */
    .tema-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      font-size: 15px;
      color: var(--text-muted);
      padding: 3px 10px;
      line-height: 1.4;
      transition: all 0.2s;
      margin-left: 8px;
    }
    .tema-btn:hover { color: var(--gold); border-color: var(--gold-border); }
    select option { background: #FDFAF5 !important; color: #1A1410 !important; }
    select:focus option { background: #F0EBE0 !important; color: #1A1410 !important; }
    /* ── Mobile sidebar ── */
    .topbar-right { display: flex; align-items: center; gap: 4px; }
    .hamburger { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 6px; }
    .hamburger span { display: block; width: 22px; height: 2px; background: var(--text-secondary, #3D342A); border-radius: 2px; transition: background 0.2s; }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(26,20,16,0.45); z-index: 199; }
    .sidebar-overlay.open { display: block; }

  </style>
</head>
<body>

  <div class="topbar">
    <a href="index.html" class="topbar-logo" style="text-decoration:none;">LEGAL<span>ATLAS</span></a>
    <nav class="topbar-nav">
      <a href="abogado.html" class="topbar-link ">Biblioteca</a>

      <a href="atlas.html" class="topbar-link topbar-link-pro ">Atlas</a>
      <a href="cuenta.html" class="topbar-link ">Mi Cuenta</a>
    </nav>
    <div class="topbar-right">
      <div class="lang-switcher" id="lang-switcher">
        <button class="lang-globe-btn" onclick="toggleLangDropdown()" title="Language / Idioma">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg><span class="lang-current" id="lang-current"></span>
        </button>
        <div class="lang-dropdown" id="lang-dropdown">
          <button class="lang-option" data-lang-btn="es" onclick="setLang('es');closeLangDropdown()">🇪🇸 Español</button>
          <button class="lang-option" data-lang-btn="cs" onclick="setLang('cs');closeLangDropdown()">🇨🇿 Čeština</button>
          <button class="lang-option" data-lang-btn="fr" onclick="setLang('fr');closeLangDropdown()">🇫🇷 Français</button>
          <button class="lang-option" data-lang-btn="en" onclick="setLang('en');closeLangDropdown()">🇬🇧 English</button>

    </div>

  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <aside class="sidebar" id="la-sidebar">
    <div class="sidebar-header">
      <a href="index.html" class="sidebar-logo">LEGAL<span>ATLAS</span></a>
      <button class="sidebar-close" onclick="closeSidebar()" aria-label="Cerrar menú">✕</button>
    </div>
    <nav class="sidebar-nav">
      <a href="abogado.html" class="sidebar-link ">Biblioteca</a>
      <a href="jurisprudencia.html" class="sidebar-link ">Judikatura</a>
      <a href="magnus.html" class="sidebar-link ">Magnus</a>
      <a href="atlas.html" class="sidebar-link ">Atlas</a>
      <a href="cuenta.html" class="sidebar-link ">Mi Cuenta</a>
    </nav>
  </aside>

  <div class="selection-bar">
    <div class="sel-group">
      <span class="sel-label" data-i18n="sel.pais.label">País</span>
      <select id="sel-pais" class="selector-estado">
        <option value="" data-i18n="sel.pais.vacio">País…</option>
      </select>
    </div>
    <!-- Área legal movida a details opcional debajo del input -->
    <div class="sel-group" id="grupo-estado" style="display:none">
      <span class="sel-label">Estado</span>
      <select id="selector-estado" class="selector-estado">
        <option value="">Selecciona tu estado...</option>
      </select>
    </div>
    <div class="sel-group" id="grupo-recetas" style="display:none">
      <span class="sel-label">Documento</span>
      <div class="recetas-wrap" id="recetas-wrap">
        <span style="font-family:'Cinzel',serif;font-size:9px;color:rgba(196,154,60,0.4);letter-spacing:0.1em;">Cargando...</span>
      </div>
    </div>
  </div>

  <div id="mensajes"></div>

  <div class="input-area">
    <div class="input-wrap">
      <div class="input-row">
        <input type="text" id="pregunta" placeholder="Selecciona un país para comenzar…" data-i18n-placeholder="apolo.placeholder.inicio" autocomplete="off" disabled>
        <button class="btn-enviar" id="enviar" disabled title="Enviar consulta">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
      <div class="input-actions">
        <button class="btn-modo-redaccion" id="btn-modo-redaccion" title="Redactar un documento jurídico" style="display:none">
          ✦ Redactar documento
        </button>
        <span class="input-disclaimer" data-i18n="apolo.disclaimer">Apolo es orientativo · No constituye asesoría jurídica</span>
      </div>
    </div>
  </div>

  <!-- Filtro opcional de área legal -->
  <details id="details-materia" style="display:none; max-width:860px; margin:4px auto 0; padding:0 16px">
    <summary style="font-size:11px; color:var(--text-muted); cursor:pointer; list-style:none; padding:4px 0; user-select:none">
      ▸ Filtrar por área legal (opcional)
    </summary>
    <div style="margin-top:8px; padding-bottom:4px">
      <div class="burbujas-wrap" id="burbujas-wrap"></div>
    </div>
  </details>

  <script>
    const mensajesEl   = document.getElementById('mensajes');
    const inputEl      = document.getElementById('pregunta');
    const btnEnviar    = document.getElementById('enviar');
    const selPais       = document.getElementById('sel-pais');
    const detailsMateria = document.getElementById('details-materia');
    const burbujaWrap   = document.getElementById('burbujas-wrap');
    const grupoEstado   = document.getElementById('grupo-estado');
    const selectorEst   = document.getElementById('selector-estado');

    let sel = { materia: null, ley: null, pais: null, estado: null, requiereEstado: false };
    let todasLasMaterias = [];

    // Country display names — usa el idioma activo del usuario
    function nombrePais(iso) {
      try {
        const lang = localStorage.getItem('atlas_lang') || 'es';
        return new Intl.DisplayNames([lang], { type: 'region' }).of(iso);
      } catch { return iso; }
    }
    function traducirMateria(materia) {
      try {
        const key = 'materia.' + materia.toLowerCase().replace(/\s+/g, '_');
        return typeof window.t === 'function' ? window.t(key, null, materia) : materia;
      } catch { return materia; }
    }

    // ── Helpers de mensajes ──────────────────────────────────────────────────
    function agregarMensaje(tipo, html) {
      const div = document.createElement('div');
      div.className = 'msg msg-' + tipo;
      const sender = tipo === 'apolo' ? 'APOLO' : (window.t ? window.t('chat.tu', null, 'TÚ') : 'TÚ');
      div.innerHTML = '<div class="msg-sender">' + sender + '</div>' + html;
      mensajesEl.appendChild(div);
      mensajesEl.scrollTop = mensajesEl.scrollHeight;
    }

    function mostrarArticulos(articulos) {
      if (!articulos || !articulos.length) return;
      const div = document.createElement('div');
      div.className = 'articulos-citados';
      div.innerHTML = articulos.map(n => '<span class="art-tag">Art. ' + n + '</span>').join('');
      mensajesEl.appendChild(div);
      mensajesEl.scrollTop = mensajesEl.scrollHeight;
    }

    function agregarTyping() {
      const div = document.createElement('div');
      div.id = 'typing';
      div.className = 'msg msg-apolo';
      div.innerHTML = '<div class="msg-sender">APOLO</div><div class="typing-dots"><span></span><span></span><span></span></div>';
      mensajesEl.appendChild(div);
      mensajesEl.scrollTop = mensajesEl.scrollHeight;
    }

    function quitarTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    // ── Saludo dinámico ──────────────────────────────────────────────────────
    function verificarListo() {
      const listo = !!sel.pais;
      inputEl.disabled   = !listo;
      btnEnviar.disabled = !listo;
      if (listo) {
        inputEl.placeholder = window.t ? window.t('apolo.placeholder.activo', null, 'Cuéntame qué pasó. Por ejemplo:\n"Mi jefe no me pagó el mes" · "El arrendador me quiere sacar sin avisar"') : 'Cuéntame qué pasó…';
      } else {
        inputEl.placeholder = window.t ? window.t('apolo.placeholder.inicio', null, 'Selecciona un país para comenzar…') : 'Selecciona un país para comenzar…';
      }
    }

    function saludoInicial() {
      mensajesEl.innerHTML = '';
      if (!sel.pais) {
        agregarMensaje('apolo', t('apolo.saludo.inicio', null, 'Soy <strong>Apolo</strong>, tu asistente legal.<br>Selecciona el <strong>país</strong> para comenzar.'));
        return;
      }
      const jurisdiccion = sel.estado && sel.ley
        ? 'el <strong>' + sel.ley + ' de ' + sel.estado + '</strong>'
        : sel.ley
          ? '<strong>' + sel.ley + '</strong> (' + nombrePais(sel.pais) + ')'
          : '<strong>' + nombrePais(sel.pais) + '</strong>';
      if (window._tipoContrato) {
        agregarMensaje('apolo', t('apolo.saludo.tipo', { tipo: window._tipoContrato.replace(/_/g, ' '), jurisdiccion }, 'Soy <strong>Apolo</strong>. Voy a ayudarte a redactar tu <strong>' + window._tipoContrato.replace(/_/g, ' ') + '</strong>.<br>Consulto ' + jurisdiccion + '. Cuéntame: ¿cuáles son los datos de las partes?'));
      } else {
        agregarMensaje('apolo', t('apolo.saludo.listo', { jurisdiccion }, 'Soy <strong>Apolo</strong>, tu asistente legal.<br>Consulto ' + jurisdiccion + '.<br>¿Cuál es tu situación?'));
      }
    }

    // ── Carga dinámica de países y materias ─────────────────────────────────
    async function cargarPaises() {
      try {
        const res = await fetch('/api/abogado?action=materias');
        todasLasMaterias = await res.json();
        const paisesUnicos = [...new Set(todasLasMaterias.map(m => m.pais))].filter(Boolean);
        selPais.innerHTML = '<option value="">País…</option>';
        paisesUnicos.forEach(iso => {
          const opt = document.createElement('option');
          opt.value = iso;
          opt.dataset.paisIso = iso;
          opt.textContent = nombrePais(iso);
          selPais.appendChild(opt);
        });
        selPais.addEventListener('change', function() {
          if (this.value) seleccionarPais(this.value);
        });
        // Default: CZ when lang=cs, otherwise MX — wait for i18n before greeting
        const _langActual = localStorage.getItem('atlas_lang') || new URLSearchParams(location.search).get('lang') || 'es';
        const _paisDefecto = _langActual === 'cs' ? 'CZ' : 'MX';
        const _doSelect = () => { if (paisesUnicos.includes(_paisDefecto)) seleccionarPais(_paisDefecto); else if (paisesUnicos.includes('MX')) seleccionarPais('MX'); };
        if (window._i18nLoaded) { _doSelect(); }
        else { document.addEventListener('i18n:ready', _doSelect, { once: true }); }
      } catch (e) {
        selPais.innerHTML = '<option value="">Error cargando países</option>';
      }
    }

    function seleccionarPais(iso) {
      selPais.value = iso;

      sel.pais    = iso;
      sel.materia = null;
      sel.ley     = null;
      sel.estado  = null;
      sel.requiereEstado = false;

      selectorEst.value = '';

      // Agrupar por materia — puebla los botones del details opcional
      const materiasDelPais = todasLasMaterias.filter(m => m.pais === iso);
      const agrupadas = {};
      materiasDelPais.forEach(m => {
        if (!agrupadas[m.materia]) agrupadas[m.materia] = { ...m, leyes: [m.ley] };
        else agrupadas[m.materia].leyes.push(m.ley);
      });

      burbujaWrap.innerHTML = '';
      Object.values(agrupadas).forEach(m => {
        const btn = document.createElement('button');
        btn.className = 'burbuja';
        btn.textContent = traducirMateria(m.materia);
        btn.dataset.materia = m.materia;
        btn.dataset.materiaEs = m.materia;
        btn.addEventListener('click', () => seleccionarMateria(m));
        burbujaWrap.appendChild(btn);
      });

      // Mostrar details de materia si hay opciones
      detailsMateria.style.display = 'none';

      // Para MX: mostrar estado de todos los materias combinados (no require materia)
      const todosEstados = [...new Set(
        materiasDelPais.filter(m => m.requiere_estado && m.estados).flatMap(m => m.estados)
      )].sort();

      if (todosEstados.length) {
        selectorEst.innerHTML = '<option value="">Estado (opcional)…</option>';
        todosEstados.forEach(e => {
          const opt = document.createElement('option');
          opt.value = e; opt.textContent = e;
          selectorEst.appendChild(opt);
        });
        grupoEstado.style.display = 'flex';
      } else {
        grupoEstado.style.display = 'none';
      }

      verificarListo();
      saludoInicial();
    }

    function seleccionarMateria(m) {
      document.querySelectorAll('#burbujas-wrap .burbuja').forEach(b => b.classList.remove('activa'));
      burbujaWrap.querySelector('[data-materia="' + m.materia + '"]').classList.add('activa');

      sel.materia        = m.materia;
      sel.ley            = m.leyes ? m.leyes[0] : m.ley;
      sel.leyes          = m.leyes || [m.ley];
      sel.estado         = null;
      sel.requiereEstado = m.requiere_estado;
      sel._estados       = m.estados || [];

      selectorEst.value = '';
      if (m.requiere_estado && sel._estados.length) {
        selectorEst.innerHTML = '<option value="">Selecciona tu estado...</option>';
        sel._estados.forEach(e => {
          const opt = document.createElement('option');
          opt.value = e; opt.textContent = e;
          selectorEst.appendChild(opt);
        });
        grupoEstado.style.display = 'flex';
      } else {
        grupoEstado.style.display = 'none';
      }

      verificarListo();
      saludoInicial();
    }

    selectorEst.addEventListener('change', function () {
      if (!this.value) return;
      sel.estado = this.value;
      if (esperandoEstadoRedaccion) {
        esperandoEstadoRedaccion = false;
        datosRedaccion['estado'] = this.value;
        agregarMensaje('apolo',
          'Perfecto. Voy a redactar una <strong>' + recetaActiva.titulo + '</strong>.<br>' +
          'Necesito algunos datos. Responde las siguientes preguntas y al final generamos el documento.'
        );
        setTimeout(preguntarSiguiente, 400);
        return;
      }
      verificarListo();
      saludoInicial();
    });

    // ── Historial de conversación ─────────────────────────────────────────────
    let conversationHistory = []

    // ── Envío de consulta ────────────────────────────────────────────────────
    async function enviar() {
      // En modo redacción, capturar respuesta para la pregunta actual
      if (modoActual === 'redaccion' && recetaActiva && preguntaIdxActual < todasLasPreguntas.length) {
        const texto = inputEl.value.trim();
        if (!texto) return;
        inputEl.value      = '';
        inputEl.disabled   = true;
        btnEnviar.disabled = true;
        agregarMensaje('usuario', texto);

        // ── Respuesta a email ─────────────────────────────────────────────
        if (esperandoEmail) {
          esperandoEmail = false;
          emailUsuario   = texto.trim();
          localStorage.setItem('atlas_email', emailUsuario);
          inputEl.disabled   = true;
          btnEnviar.disabled = true;
          generarPreview();
          return;
        }

        // ── Respuesta a confirmación de nombre ────────────────────────────
        if (esperandoConfirmacionNombre) {
          esperandoConfirmacionNombre = false;
          const nombreGuardado = localStorage.getItem('atlas_nombre');
          const confirmaciones  = ['si', 'sí', 's', 'yes', 'y', 'ok', 'claro', 'correcto', 'ese soy yo'];
          const esConfirmacion  = confirmaciones.includes(texto.trim().toLowerCase());
          const nombreFinal     = esConfirmacion ? nombreGuardado : texto.trim();
          datosRedaccion[campoNombreUsuario] = nombreFinal;
          if (!esConfirmacion) localStorage.setItem('atlas_nombre', nombreFinal);
          preguntaIdxActual++;
          setTimeout(preguntarSiguiente, 300);
          return;
        }

        const pregunta = todasLasPreguntas[preguntaIdxActual];
        datosRedaccion[pregunta.campo] = texto;
        // Guardar nombre en localStorage cuando se responde por primera vez
        if (pregunta.campo === campoNombreUsuario) {
          localStorage.setItem('atlas_nombre', texto);
        }
        preguntaIdxActual++;
        setTimeout(preguntarSiguiente, 300);
        return;
      }

      const texto = inputEl.value.trim();
      if (!texto) return;

      inputEl.value = '';
      btnEnviar.disabled = true;
      agregarMensaje('usuario', texto);
      agregarTyping();

      conversationHistory.push({ role: 'user', content: texto })
      if (conversationHistory.length > 10) conversationHistory = conversationHistory.slice(-10)

      try {
        const res = await fetch('/api/asesoria', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            pregunta: texto,
            estado:   sel.estado || '',
            pais:     sel.pais   || '',
            tema:     sel.materia || '',
            fuente:   sel.ley    || '',
            modo:     'consulta',
            tipo:     window._tipoContrato || '',
            historial: conversationHistory.slice(0, -1) // excluir el último (ya es la pregunta actual)
          })
        });

        quitarTyping();
        if (!res.ok) {
          let details = ''
          try { const errBody = await res.json(); details = errBody.details || errBody.error || '' } catch {}
          console.error('[asesoria 500]', details)
          throw new Error('HTTP ' + res.status + (details ? ': ' + details : ''))
        }

        const data = await res.json();
        const r = data.respuesta;
        const respuestaTexto = r.draftHtml || r.resumen || 'Sin respuesta.'
        agregarMensaje('apolo', respuestaTexto);
        mostrarArticulos(r.articulos);

        conversationHistory.push({ role: 'assistant', content: respuestaTexto })
        if (conversationHistory.length > 10) conversationHistory = conversationHistory.slice(-10)

      } catch (err) {
        quitarTyping();
        conversationHistory.pop() // revertir el push del usuario si falló
        agregarMensaje('apolo', 'Error al conectar con el motor: ' + err.message);
      }

      btnEnviar.disabled = false;
      inputEl.focus();
    }

    btnEnviar.addEventListener('click', enviar);
    inputEl.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
    });

    // ── Modo Redacción ────────────────────────────────────────────────────────
    let modoActual        = 'consulta';
    let recetaActiva      = null;
    let datosRedaccion    = {};
    let preguntaIdxActual = 0;
    let todasLasPreguntas = [];
    let campoNombreUsuario          = null;  // primer nombre_* de la receta activa
    let esperandoConfirmacionNombre = false;
    let emailUsuario                = null;
    let esperandoEmail              = false;
    let esperandoEstadoRedaccion    = false;

    const btnModoRed  = document.getElementById('btn-modo-redaccion');
    const grupoRecetas = document.getElementById('grupo-recetas');
    const recetasWrap  = document.getElementById('recetas-wrap');

    btnModoRed.addEventListener('click', function () {
      if (modoActual === 'consulta') activarModoRedaccion();
      else activarModoConsulta();
    });

    function activarModoRedaccion() {
      modoActual = 'redaccion';
      btnModoRed.classList.add('activo');
      btnModoRed.title = 'Volver al modo consulta';
      grupoRecetas.style.display = 'flex';
      recetaActiva = null; datosRedaccion = {}; preguntaIdxActual = 0;
      inputEl.disabled = true; btnEnviar.disabled = true;
      mensajesEl.innerHTML = '';
      agregarMensaje('apolo', 'Modo Redacción activado. Selecciona el tipo de documento que necesitas generar.');
      cargarRecetas();
    }

    function activarModoConsulta() {
      modoActual = 'consulta';
      btnModoRed.classList.remove('activo');
      btnModoRed.title = 'Modo Redacción — redacta un documento con precisión jurídica';
      grupoRecetas.style.display = 'none';
      recetaActiva = null; datosRedaccion = {};
      saludoInicial();
      verificarListo();
    }

    async function cargarRecetas() {
      try {
        const pais = sel.pais || 'MX';
        const res  = await fetch('/api/redactar?pais=' + pais);
        const lista = await res.json();
        recetasWrap.innerHTML = '';
        lista.forEach(r => {
          const btn = document.createElement('button');
          btn.className = 'burbuja';
          btn.textContent = r.titulo;
          btn.dataset.tipo = r.tipo;
          btn.addEventListener('click', () => seleccionarReceta(r.tipo));
          recetasWrap.appendChild(btn);
        });
      } catch (e) {
        recetasWrap.innerHTML = '<span style="font-family:Cinzel,serif;font-size:9px;color:rgba(196,154,60,0.4);">Error cargando documentos</span>';
      }
    }

    async function seleccionarReceta(tipo) {
      recetasWrap.querySelectorAll('.burbuja').forEach(b => b.classList.remove('activa'));
      recetasWrap.querySelector(`[data-tipo="${tipo}"]`)?.classList.add('activa');
      try {
        const pais = sel.pais || 'MX';
        const res = await fetch('/api/redactar?tipo=' + tipo + '&pais=' + pais);
        recetaActiva = await res.json();
        // Campo nombre del usuario: primer nombre_* en datos_requeridos
        campoNombreUsuario = (recetaActiva.datos_requeridos || [])
          .find(d => d.campo.startsWith('nombre_'))?.campo || null;
        esperandoConfirmacionNombre = false;
        // Pre-llenar datos conocidos del contexto actual
        datosRedaccion = {};
        if (sel.estado) datosRedaccion['estado'] = sel.estado;
        preguntaIdxActual = 0;
        todasLasPreguntas = [
          ...(recetaActiva.datos_requeridos     || []),
          ...(recetaActiva.preguntas_profundidad || [])
        ];
        const puedeEmpezar = await verificarJurisdiccion(recetaActiva);
        if (!puedeEmpezar) return;
        agregarMensaje('apolo',
          'Perfecto. Voy a redactar una <strong>' + recetaActiva.titulo + '</strong>.<br>' +
          'Necesito algunos datos. Responde las siguientes preguntas y al final generamos el documento.'
        );
        setTimeout(preguntarSiguiente, 400);
      } catch (e) {
        agregarMensaje('apolo', 'Error cargando el documento: ' + e.message);
      }
    }

    async function verificarJurisdiccion(receta) {
      const j = receta.jurisdiccion;
      if (sel.estado) return true;
      if (!j?.requiere_estado) return true;
      // Siempre pedir el estado — acepta_federal solo controla si "Federal" aparece como opción
      agregarMensaje('apolo',
        'Para redactar este contrato necesito saber en qué estado se firma. ¿En qué estado de la República se celebrará?'
      );
      activarSelectorEstadoParaRedaccion(j.acepta_federal === true);
      return false;
    }

    function activarSelectorEstadoParaRedaccion(incluirFederal) {
      esperandoEstadoRedaccion = true;
      const estados32 = [
        'Aguascalientes','Baja California','Baja California Sur','Campeche','Chiapas',
        'Chihuahua','Ciudad de México','Coahuila','Colima','Durango','Guanajuato',
        'Guerrero','Hidalgo','Jalisco','México','Michoacán','Morelos','Nayarit',
        'Nuevo León','Oaxaca','Puebla','Querétaro','Quintana Roo','San Luis Potosí',
        'Sinaloa','Sonora','Tabasco','Tamaulipas','Tlaxcala','Veracruz','Yucatán','Zacatecas'
      ];
      selectorEst.innerHTML = '<option value="">Selecciona tu estado...</option>';
      if (incluirFederal) {
        const opt = document.createElement('option');
        opt.value = 'Federal'; opt.textContent = 'Federal (aplica en todo México)';
        selectorEst.appendChild(opt);
      }
      estados32.forEach(e => {
        const opt = document.createElement('option');
        opt.value = e; opt.textContent = e;
        selectorEst.appendChild(opt);
      });
      selectorEst.value = '';
      grupoEstado.style.display = 'flex';
    }

    function preguntarSiguiente() {
      // Saltar preguntas ya pre-llenadas
      while (preguntaIdxActual < todasLasPreguntas.length &&
             datosRedaccion[todasLasPreguntas[preguntaIdxActual].campo] !== undefined) {
        preguntaIdxActual++;
      }
      if (preguntaIdxActual >= todasLasPreguntas.length) {
        mostrarBotonGenerar();
        return;
      }
      const p = todasLasPreguntas[preguntaIdxActual];

      // ── Confirmación de nombre guardado ──────────────────────────────────
      const nombreGuardado = localStorage.getItem('atlas_nombre');
      if (p.campo === campoNombreUsuario && nombreGuardado && !esperandoConfirmacionNombre) {
        esperandoConfirmacionNombre = true;
        agregarMensaje('apolo',
          '¿Eres tú, <strong>' + nombreGuardado + '</strong>?<br>' +
          '<em style="opacity:0.45;font-size:12px;">Escribe "sí" para confirmar, o tu nombre completo si es diferente.</em>'
        );
        inputEl.disabled   = false;
        btnEnviar.disabled = false;
        inputEl.placeholder = 'sí / tu nombre completo…';
        inputEl.focus();
        return;
      }

      // ── Pregunta con opciones → mostrar botones ──────────────────────────
      if (p.opciones?.length) {
        const esOp = p.opcional
          ? '<br><em style="opacity:0.45;font-size:12px;">(opcional)</em>' : '';
        const btns = p.opciones.map(op =>
          `<button class="burbuja" style="margin:4px 4px 0 0;font-size:10px;"
            onclick="elegirOpcion(this,'${op.replace(/'/g,"\\'")}')">
            ${op}
          </button>`
        ).join('');
        agregarMensaje('apolo', '<strong>' + p.pregunta + '</strong>' + esOp + '<br><br>' + btns);
        inputEl.disabled   = true;
        btnEnviar.disabled = true;
        return;
      }

      const esOp = p.opcional
        ? '<br><em style="opacity:0.45;font-size:12px;">(opcional — escribe "no" para omitir)</em>'
        : '';
      agregarMensaje('apolo',
        '<strong>' + p.pregunta + '</strong>' + esOp +
        '<br><em style="opacity:0.4;font-size:12px;">Ej: ' + (p.ejemplo || '...') + '</em>'
      );
      inputEl.disabled   = false;
      btnEnviar.disabled = false;
      inputEl.placeholder = 'Escribe tu respuesta…';
      inputEl.focus();
    }

    function elegirOpcion(btn, valor) {
      // Deshabilitar todos los botones de esa pregunta
      btn.closest('.msg-apolo').querySelectorAll('.burbuja').forEach(b => {
        b.disabled = true;
        b.style.opacity = '0.4';
      });
      btn.style.opacity = '1';
      btn.style.background = 'var(--gold)';
      btn.style.color = '#08080a';

      agregarMensaje('usuario', valor);
      const pregunta = todasLasPreguntas[preguntaIdxActual];
      datosRedaccion[pregunta.campo] = valor;
      if (pregunta.campo === campoNombreUsuario) localStorage.setItem('atlas_nombre', valor);
      preguntaIdxActual++;
      setTimeout(preguntarSiguiente, 300);
    }

    // htmlPreview guarda el documento generado antes del pago
    let htmlPreview = null;

    function mostrarBotonGenerar() {
      // Pedir email si no lo tenemos aún
      const emailGuardado = localStorage.getItem('atlas_email');
      if (!emailUsuario && !emailGuardado) {
        esperandoEmail = true;
        agregarMensaje('apolo',
          '¿A qué email te enviamos el documento una vez confirmado el pago?<br>' +
          '<em style="opacity:0.45;font-size:12px;">Solo para enviarte el documento — no spam.</em>'
        );
        inputEl.disabled   = false;
        btnEnviar.disabled = false;
        inputEl.placeholder = 'tu@email.com';
        inputEl.focus();
        return;
      }
      emailUsuario = emailUsuario || emailGuardado;
      inputEl.disabled   = true;
      btnEnviar.disabled = true;
      generarPreview();
    }

    async function generarPreview() {
      agregarTyping();
      try {
        const res = await fetch('/api/redactar', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ tipo: recetaActiva.tipo, datos: datosRedaccion, pais: sel.pais || 'MX' })
        });
        quitarTyping();
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        htmlPreview = data.html;

        const precio = recetaActiva?.precio_mxn || 0;
        const div = document.createElement('div');
        div.className = 'msg msg-apolo';
        div.style.maxWidth = '720px';
        div.innerHTML =
          '<div class="msg-sender">APOLO — VISTA PREVIA</div>' +
          '<div class="doc-preview-wrap">' +
            '<div class="doc-container">' + data.html + '</div>' +
            '<div class="doc-watermark">VISTA PREVIA<br>PENDIENTE DE PAGO</div>' +
          '</div>' +
          (data.nota ? '<div class="nota-legal">' + data.nota + '</div>' : '') +
          (data.nota_upsell ? '<div class="nota-legal" style="border-left-color:rgba(196,154,60,0.6);margin-top:6px;">✦ ' + data.nota_upsell + '</div>' : '') +
          '<p style="font-family:\'Cinzel\',serif;font-size:11px;letter-spacing:0.1em;color:#c49a3c;margin:12px 0 6px;">Precio: <strong>$' + precio + ' MXN</strong></p>' +
          '<button class="btn-generar" id="btn-pagar">💳 Pagar y Desbloquear Documento</button>';
        mensajesEl.appendChild(div);
        mensajesEl.scrollTop = mensajesEl.scrollHeight;
        document.getElementById('btn-pagar').addEventListener('click', iniciarPago);
      } catch (err) {
        quitarTyping();
        agregarMensaje('apolo', 'Error generando la vista previa: ' + err.message);
      }
    }

    async function iniciarPago() {
      const btn = document.getElementById('btn-pagar');
      if (btn) { btn.disabled = true; btn.textContent = 'Redirigiendo a pago…'; }
      try {
        const res = await fetch('/api/crear-pago', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({
            receta_id:      recetaActiva.tipo,
            precio_mxn:     recetaActiva.precio_mxn,
            titulo:         recetaActiva.titulo,
            estado:         sel.estado || '',
            datos_usuario:  datosRedaccion,
            documento_html: htmlPreview,
            email:          emailUsuario || localStorage.getItem('atlas_email') || null
          })
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const { url } = await res.json();
        window.location.href = url;
      } catch (err) {
        agregarMensaje('apolo', 'Error al iniciar el pago: ' + err.message);
        if (btn) { btn.disabled = false; btn.textContent = '💳 Pagar y Desbloquear Documento'; }
      }
    }

    function mostrarDocumentoDesbloqueado(html, nota) {
      const div = document.createElement('div');
      div.className = 'msg msg-apolo';
      div.style.maxWidth = '720px';
      div.innerHTML =
        '<div class="msg-sender">APOLO — DOCUMENTO DESBLOQUEADO</div>' +
        '<div class="doc-container" id="doc-generado">' + html + '</div>' +
        (nota ? '<div class="nota-legal">' + nota + '</div>' : '') +
        '<button class="btn-docx" id="btn-docx">⬇ Descargar DOCX</button>';
      mensajesEl.appendChild(div);
      mensajesEl.scrollTop = mensajesEl.scrollHeight;
      document.getElementById('btn-docx').addEventListener('click', descargarDOCX);
    }

    // ── Retorno desde Stripe ──────────────────────────────────────────────────
    (function detectarRetornoStripe() {
      const params     = new URLSearchParams(window.location.search);
      const pago       = params.get('pago');
      const session_id = params.get('session_id');
      if (!pago) return;

      window.history.replaceState({}, '', window.location.pathname);

      if (pago === 'exitoso' && session_id) {
        activarModoRedaccion();
        agregarTyping();
        // Polling — el webhook puede tardar 1-3s en marcar el borrador como completado
        let intentos = 0;
        const maxIntentos = 8;
        const intervalo = setInterval(async () => {
          intentos++;
          try {
            const res = await fetch('/api/documento?session_id=' + session_id);
            if (res.ok) {
              clearInterval(intervalo);
              quitarTyping();
              const data = await res.json();
              agregarMensaje('apolo', '✅ <strong>Pago confirmado.</strong> Tu documento está listo.');
              mostrarDocumentoDesbloqueado(data.html, null);
            } else if (intentos >= maxIntentos) {
              clearInterval(intervalo);
              quitarTyping();
              agregarMensaje('apolo', '✅ Pago confirmado. El documento tardó más de lo esperado en procesarse. Por favor recarga la página en unos segundos o contáctanos.');
            }
          } catch (e) {
            if (intentos >= maxIntentos) {
              clearInterval(intervalo);
              quitarTyping();
              agregarMensaje('apolo', 'Error recuperando el documento: ' + e.message);
            }
          }
        }, 2000);

      } else if (pago === 'cancelado') {
        activarModoRedaccion();
        agregarMensaje('apolo', 'El pago fue cancelado. Puedes intentarlo nuevamente cuando gustes.');
      }
    })();

    function descargarDOCX() {
      const docEl = document.getElementById('doc-generado');
      if (!docEl) { alert('Primero genera el documento.'); return; }
      const titulo = (recetaActiva?.titulo || 'documento').replace(/\s+/g, '_');
      const content = '<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body>' + docEl.innerHTML + '<\/body><\/html>';
      const blob = htmlDocx.asBlob(content);
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = titulo + '.docx';
      a.click();
      URL.revokeObjectURL(url);
    }

    // ── URL params: pre-selección desde homepage ─────────────────────────────
    function aplicarURLParams() {
      const params  = new URLSearchParams(window.location.search);
      const pais    = params.get('pais');
      const materia = params.get('materia');
      const estado  = params.get('estado');
      const q       = params.get('q');
      const tipo    = params.get('tipo');
      if (tipo) window._tipoContrato = tipo;

      if (!pais) return;

      seleccionarPais(pais);

      // Pre-llenar texto aunque no haya materia (viene de homepage)
      if (q) {
        inputEl.value = q;
        window.history.replaceState({}, '', window.location.pathname);
      }

      if (!materia) {
        if (q) setTimeout(() => { if (!inputEl.disabled) enviar(); }, 150);
        return;
      }

      // Reconstruir agrupadas para encontrar el objeto de materia
      const agrupadas = {};
      todasLasMaterias.filter(m => m.pais === pais).forEach(m => {
        if (!agrupadas[m.materia]) agrupadas[m.materia] = { ...m, leyes: [m.ley] };
        else agrupadas[m.materia].leyes.push(m.ley);
      });
      const mObj = agrupadas[materia];
      if (!mObj) return;
      seleccionarMateria(mObj);

      if (estado && mObj.requiere_estado) {
        selectorEst.value = estado;
        sel.estado = estado;
        verificarListo();
        saludoInicial();
      }

      if (q) {
        setTimeout(() => { if (!inputEl.disabled) enviar(); }, 150);
      }
    }

    // ── Init ─────────────────────────────────────────────────────────────────
    saludoInicial();
    cargarPaises().then(() => aplicarURLParams());
  </script>


<script>
function openSidebar() {
  document.getElementById('la-sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeSidebar() {
  document.getElementById('la-sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// Al cambiar idioma, re-renderizar pills de países y materias
const _origSetLang = window.setLang;
window.setLang = async function(lang) {
  await _origSetLang(lang);
  document.querySelectorAll('#sel-pais option[value]').forEach(opt => {
    if (opt.value) opt.textContent = nombrePais(opt.value);
  });
  document.querySelectorAll('[data-materia-es]').forEach(btn => {
    btn.textContent = traducirMateria(btn.dataset.materiaEs);
  });
};
</script>
<script defer src="/_vercel/insights/script.js"></script>
