<html lang="es">
<head>
<script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tesseum — Atlas ⚡</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400;1,9..144,500&display=swap" rel="stylesheet">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <script src="/locales/i18n.js"></script>
  <style>
    :root {
      --bg-deep:        #F4EFE4;
      --bg-card:        #ECE5D4;
      --bg-elevated:    #E4DCC5;
      --bg-input:       #ECE5D4;
      --text-primary:   #0A0A09;
      --text-secondary: #1A1815;
      --text-muted:     #3A3530;
      --gold:           #8F6A2A;
      --gold-light:     #B8893D;
      --gold-dim:       rgba(143,106,42,0.08);
      --gold-border:    rgba(143,106,42,0.22);
      --border:         #D8CFBA;
      --border-hover:   #C4B79E;
      --shadow-sm:      0 1px 4px rgba(10,10,9,0.07);
      --shadow-md:      0 4px 20px rgba(10,10,9,0.10);
    }
    :root[data-theme="dark"] {
      --bg-deep:        #0C0C0A;
      --bg-card:        #141412;
      --bg-elevated:    #1C1C19;
      --bg-input:       #1C1C19;
      --text-primary:   #F0ECE4;
      --text-secondary: #D0C4B4;
      --text-muted:     #9C9082;
      --gold:           #B8893D;
      --gold-light:     #D4A55C;
      --gold-dim:       rgba(184,137,61,0.10);
      --gold-border:    rgba(184,137,61,0.20);
      --border:         #2A2A26;
      --border-hover:   #3D3D38;
      --shadow-sm:      0 1px 4px rgba(0,0,0,0.25);
      --shadow-md:      0 4px 20px rgba(0,0,0,0.35);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Fraunces', Georgia, serif; background: var(--bg-deep); color: var(--text-primary); min-height: 100vh; overflow: hidden; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(184,137,61,0.25); border-radius: 2px; }

    /* ═══ TOPBAR ═══ */
    .topbar { height: 58px; display: flex; align-items: center; justify-content: space-between; padding: 0 28px; gap: 16px; background: var(--bg-card); border-bottom: 1px solid var(--border); box-shadow: var(--shadow-sm); position: relative; z-index: 100; }
    .topbar-logo, .sidebar-logo { display: inline-flex !important; align-items: center; gap: 10px; font-weight: 500 !important; letter-spacing: .25em !important; }
    .topbar-logo .logo-mark, .sidebar-logo .logo-mark { width: 22px; height: 22px; flex-shrink: 0; }
    .topbar-logo { font-family: 'Fraunces', serif; font-size: 0.85rem; font-weight: 700; letter-spacing: 0.3em; color: var(--text-primary); text-decoration: none; }
    .topbar-logo span { color: var(--gold); font-weight: 400; }
    .topbar-nav { display: flex; gap: 28px; }
    .topbar-link { font-family: 'Fraunces', serif; font-size: 11.5px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-secondary); text-decoration: none; transition: color 0.2s; }
    .topbar-link:hover { color: var(--gold); }
    .topbar-link.active { color: var(--gold); }
    .topbar-link-pro { display: flex; align-items: center; gap: 5px; }
    .pro-badge { font-size: 8px; letter-spacing: 0.08em; background: var(--gold-dim); border: 1px solid var(--gold-border); color: var(--gold); padding: 2px 5px; border-radius: 4px; }
    .topbar-right { display: flex; align-items: center; gap: 4px; }
    .tema-btn { background: none; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; font-size: 15px; color: var(--text-muted); padding: 3px 10px; line-height: 1.4; transition: all 0.2s; margin-left: 8px; }
    .tema-btn:hover { color: var(--gold); border-color: var(--gold-border); }

    /* Lang switcher */
    .lang-switcher { position: relative; }
    .lang-globe-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; gap: 5px; font-family: 'Fraunces', serif; font-size: 10px; letter-spacing: 0.08em; padding: 4px 6px; border-radius: 6px; transition: color 0.2s; }
    .lang-globe-btn:hover { color: var(--gold); }
    .lang-current { font-size: 10px; }
    .lang-dropdown { position: absolute; top: calc(100% + 8px); right: 0; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; box-shadow: var(--shadow-md); display: none; flex-direction: column; min-width: 130px; overflow: hidden; z-index: 200; }
    .lang-dropdown.open { display: flex; }
    .lang-option { background: none; border: none; cursor: pointer; padding: 9px 14px; font-family: 'Fraunces', serif; font-size: 12px; color: var(--text-secondary); text-align: left; transition: background 0.15s; }
    .lang-option:hover { background: var(--bg-elevated); }

    /* Hamburger */
    .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 6px; flex-direction: column; gap: 5px; }
    .hamburger span { display: block; width: 22px; height: 2px; background: var(--text-secondary); border-radius: 2px; }

    /* Sidebar */
    .sidebar { position: fixed; top: 0; right: -280px; width: 260px; height: 100vh; background: var(--bg-card); border-left: 1px solid var(--border); box-shadow: -8px 0 32px rgba(10,10,9,0.15); z-index: 200; transition: right 0.3s ease; display: flex; flex-direction: column; }
    .sidebar.open { right: 0; }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(10,10,9,0.45); z-index: 199; }
    .sidebar-overlay.open { display: block; }
    .sidebar-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid var(--border); }
    .sidebar-close { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 18px; padding: 4px; line-height: 1; }
    .sidebar-close:hover { color: var(--text-primary); }
    .sidebar-nav { flex: 1; display: flex; flex-direction: column; padding: 16px 0; overflow-y: auto; }
    .sidebar-link { font-family: 'Fraunces', serif; font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-secondary); text-decoration: none; padding: 12px 24px; border-left: 3px solid transparent; transition: all 0.2s; }
    .sidebar-link:hover, .sidebar-link.active { color: var(--gold); background: rgba(143,106,42,0.06); border-left-color: var(--gold); }

    @media (max-width: 680px) {
      .topbar-nav { display: none; }
      .hamburger { display: flex; }
    }

    /* ═══ ATLAS LAYOUT ═══ */
    .atlas-layout { display: flex; height: calc(100vh - 58px); overflow: hidden; }

    /* ═══ LEFT PANEL ═══ */
    .atlas-panel { width: 300px; min-width: 300px; background: var(--bg-card); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .panel-header { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .panel-eyebrow { font-family: 'Fraunces', serif; font-size: 9px; letter-spacing: 0.3em; color: var(--gold); text-transform: uppercase; margin-bottom: 6px; }
    .panel-title { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 700; color: var(--text-primary); }
    .panel-title span { color: var(--gold); }

    .panel-form { padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; border-bottom: 1px solid var(--border); }
    .atlas-select { width: 100%; padding: 8px 12px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-family: 'Fraunces', serif; font-size: 13px; outline: none; cursor: pointer; transition: border-color 0.2s; }
    .atlas-select:focus { border-color: var(--gold); }
    .atlas-textarea { width: 100%; min-height: 100px; max-height: 160px; padding: 10px 12px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-family: 'Fraunces', serif; font-size: 13px; outline: none; resize: vertical; line-height: 1.5; transition: border-color 0.2s; }
    .atlas-textarea:focus { border-color: var(--gold); }
    .atlas-textarea::placeholder { color: var(--text-muted); }
    .atlas-btn { width: 100%; padding: 11px; background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%); color: #fff; border: none; border-radius: 8px; font-family: 'Fraunces', serif; font-size: 11px; letter-spacing: 0.2em; cursor: pointer; transition: opacity 0.2s; }
    .atlas-btn:hover { opacity: 0.88; }
    .atlas-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .atlas-btn-abort { width: 100%; padding: 11px; background: transparent; color: var(--text-muted); border: 1px solid var(--border); border-radius: 8px; font-family: 'Fraunces', serif; font-size: 11px; letter-spacing: 0.15em; cursor: pointer; transition: all 0.2s; margin-top: 6px; }
    .atlas-btn-abort:hover { border-color: #c0392b; color: #c0392b; }

    .panel-loading { display: none; padding: 16px 20px; font-family: 'Fraunces', serif; font-size: 9px; letter-spacing: 0.15em; color: var(--gold); text-align: center; flex-shrink: 0; }
    .panel-loading-dot { animation: blink 1.2s ease infinite; }
    .panel-loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .panel-loading-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }

    .panel-results { flex: 1; overflow-y: auto; padding: 12px 0; }

    /* ═══ LAW GROUP LIST ═══ */
    .ley-section-label { font-family: 'Fraunces', serif; font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; padding: 8px 20px 4px; margin-bottom: 2px; }
    .ley-section-label.tesis    { color: #4A80F0; }
    .ley-section-label.antitesis { color: #E05050; }
    .ley-section-label.neutral  { color: var(--text-muted); }

    .ley-item { display: flex; flex-direction: column; gap: 3px; padding: 9px 20px; cursor: pointer; border-left: 2px solid transparent; transition: all 0.15s; }
    .ley-item:hover { background: var(--bg-elevated); }
    .ley-item.tesis:hover, .ley-item.tesis.active   { border-left-color: #4A80F0; background: rgba(74,128,240,0.06); }
    .ley-item.antitesis:hover, .ley-item.antitesis.active { border-left-color: #E05050; background: rgba(224,80,80,0.06); }
    .ley-item.neutral:hover, .ley-item.neutral.active { border-left-color: var(--text-muted); background: var(--bg-elevated); }

    .ley-item-row1 { display: flex; align-items: center; gap: 8px; }
    .ley-abrev { font-family: 'Fraunces', serif; font-size: 12px; font-weight: 700; min-width: 36px; flex-shrink: 0; }
    .ley-item.tesis    .ley-abrev { color: #4A80F0; }
    .ley-item.antitesis .ley-abrev { color: #E05050; }
    .ley-item.neutral  .ley-abrev { color: var(--text-muted); }
    .ley-nombre { font-size: 11px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .ley-item-meta { display: flex; gap: 8px; align-items: center; padding-left: 44px; }
    .ley-arts-badge { font-family: 'Fraunces', serif; font-size: 9px; color: var(--text-muted); background: var(--bg-elevated); padding: 2px 7px; border-radius: 20px; }
    .ley-score-badge { font-family: 'Fraunces', serif; font-size: 9px; color: var(--gold); }

    /* ═══ LAW DETAIL DRAWER ═══ */
    .ley-detail { display: none; position: absolute; bottom: 0; left: 0; right: 0; max-height: 52%; background: var(--bg-card); border-top: 2px solid var(--gold-border); padding: 16px 20px 20px; overflow-y: auto; z-index: 10; box-shadow: 0 -4px 24px rgba(0,0,0,0.15); }
    .ley-detail.open { display: block; }
    .ley-detail-close { position: absolute; top: 12px; right: 14px; background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 16px; }
    .ley-detail-titulo { font-family: 'Fraunces', serif; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; margin-bottom: 3px; padding-right: 24px; }
    .ley-detail-sub { font-size: 11px; color: var(--text-muted); margin-bottom: 14px; }

    .ley-detail-art { padding: 10px 0; border-top: 1px solid var(--border); }
    .ley-detail-art-header { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .ley-detail-art-num { font-family: 'Fraunces', serif; font-size: 11px; font-weight: 600; }
    .ley-detail-art-badge { font-family: 'Fraunces', serif; font-size: 8px; letter-spacing: 0.1em; padding: 2px 6px; border-radius: 20px; }
    .ley-detail-art-badge.tesis    { color: #4A80F0; background: rgba(74,128,240,0.1); }
    .ley-detail-art-badge.antitesis { color: #E05050; background: rgba(224,80,80,0.1); }
    .ley-detail-art-badge.neutral  { color: var(--text-muted); background: var(--bg-elevated); }
    .ley-detail-art-texto { font-size: 11px; color: var(--text-secondary); line-height: 1.65; max-height: 72px; overflow: hidden; transition: max-height 0.3s ease; }
    .ley-detail-art-texto.expandido { max-height: 500px; }
    .ley-detail-art-ver { background: none; border: none; font-size: 10px; font-family: 'Fraunces', serif; color: var(--gold); cursor: pointer; padding: 3px 0; letter-spacing: 0.1em; }

    /* ═══ CANVAS AREA ═══ */
    .atlas-canvas-wrap { flex: 1; position: relative; overflow: hidden; background: #050403; }
    #atlas-svg { width: 100%; height: 100%; display: block; }

    /* ═══ TOOLTIP ═══ */
    .planet-tooltip { display: none; position: fixed; background: var(--bg-card); border: 1px solid var(--gold-border); border-radius: 8px; padding: 10px 14px; pointer-events: none; z-index: 200; max-width: 260px; box-shadow: var(--shadow-md); }
    .planet-tooltip.visible { display: block; }
    .tooltip-ley-nombre { font-family: 'Fraunces', serif; font-size: 12px; font-weight: 700; margin-bottom: 4px; }
    .tooltip-stats { font-family: 'Fraunces', serif; font-size: 10px; color: var(--gold); margin-bottom: 3px; }
    .tooltip-tipo { font-family: 'Fraunces', serif; font-size: 9px; letter-spacing: 0.15em; opacity: 0.8; }

    /* ═══ CANVAS EMPTY STATE ═══ */
    .canvas-empty { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
    .canvas-empty-glyph { font-family: 'Fraunces', serif; font-size: 64px; color: rgba(184,137,61,0.15); margin-bottom: 16px; }
    .canvas-empty-text { font-family: 'Fraunces', serif; font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(184,137,61,0.3); }

    @media (max-width: 680px) {
      .atlas-layout { flex-direction: column; }
      .atlas-panel { width: 100%; min-width: 0; height: auto; max-height: 55vh; border-right: none; border-bottom: 1px solid var(--border); }
      .atlas-canvas-wrap { flex: 1; min-height: 45vh; }
    }
  </style>
</head>

<div class="atlas-layout">

  <!-- ═══ LEFT PANEL ═══ -->
  <aside class="atlas-panel" style="position:relative;">

    <div class="panel-header">
      <p class="panel-eyebrow" data-i18n="atlas.eyebrow">Dialéctica Hegeliana · Tesseum</p>
      <h1 class="panel-title">AT<span>LAS</span> ⚡</h1>
    </div>

    <div class="panel-form">
      <select id="pais-select" class="atlas-select">
        <option value="">Cargando países…</option>
      </select>
      <select id="estado-select" class="atlas-select" style="display:none">
        <option value="">Todos los estados</option>
      </select>
      <textarea
        id="caso-input"
        class="atlas-textarea"
        data-i18n-placeholder="atlas.placeholder"
        placeholder="Describe el caso o la pregunta jurídica. Incluye los hechos relevantes: partes, qué ocurrió y qué necesitas saber."
      ></textarea>
      <button id="btn-atlas" class="atlas-btn" onclick="analizarAtlas()" data-i18n="atlas.btn.analizar">
        ATLAS ⚡ — ANALIZAR
      </button>
      <button id="btn-abort" class="atlas-btn-abort" onclick="abortarAtlas()" style="display:none" data-i18n="atlas.btn.abortar">
        ✕ CANCELAR
      </button>
    </div>

    <div class="panel-loading" id="panel-loading">
      <span data-i18n="atlas.analizando">ANALIZANDO</span><span class="panel-loading-dot">.</span><span class="panel-loading-dot">.</span><span class="panel-loading-dot">.</span>
    </div>

    <div class="panel-results" id="panel-results"></div>

    <!-- Law detail drawer -->
    <div class="ley-detail" id="ley-detail">
      <button class="ley-detail-close" onclick="cerrarDetalle()">✕</button>
      <div class="ley-detail-titulo" id="detail-ley-titulo"></div>
      <div class="ley-detail-sub" id="detail-ley-sub"></div>
      <div id="detail-arts-list"></div>
    </div>

  </aside>

  <!-- ═══ GRAPH CANVAS ═══ -->
  <div class="atlas-canvas-wrap" id="canvas-wrap">

<script>
// ═══════════════════════════════════════════════

const PAISES = [
  { value:'MX', label:'🇲🇽 México', estados: true },

// ═══════════════════════════════════════════════
// LAW ABBREVIATIONS
// ═══════════════════════════════════════════════
const LEY_ABREVS = {
  'Zákoník práce': 'ZP', 'Listina základních práv a svobod': 'LZPS',
  'Ústava České republiky': 'Ústava', 'Občanský zákoník': 'OZ',
  'Zákon o obchodních korporacích': 'ZOK', 'Trestní zákoník': 'TZ',
  'Trestní řád': 'TŘ', 'Občanský soudní řád': 'OSŘ',
  'Insolvenční zákon': 'IZ', 'Exekuční řád': 'EŘ',
  'Správní řád': 'SŘ', 'Zákon o mezinárodním právu soukromém': 'ZMPS',
  'Constitución Política de los Estados Unidos Mexicanos': 'CPEUM',
  'Ley Federal del Trabajo': 'LFT', 'Código Civil': 'CC',
  'Código de Comercio': 'CdC', 'Codigo Penal Federal': 'CPF',
  'Ley de Amparo': 'LA', 'Ley General de Titulos y Operaciones de Credito': 'LGTOC',
  'Bürgerliches Gesetzbuch': 'BGB', 'Zivilprozessordnung': 'ZPO',
  'Strafprozessordnung': 'StPO', 'Handelsgesetzbuch': 'HGB',
  'Código Penal': 'CP', 'Ley de Enjuiciamiento Civil': 'LEC',
  'Code Civil': 'CC', 'Code du travail': 'CT',
  'Code de commerce': 'Ccom', 'Code de procédure civile': 'CPC',
  'Zivilgesetzbuch': 'ZGB', 'Obligationenrecht': 'OR',
}

const STOP_WORDS = new Set(['de','la','el','del','los','las','y','e','a','en','con','por','al','lo','un','una','su','sobre','que','o','para','sin','entre','ante'])

function normalizeLeyName(s) {
  if (!s.includes('�')) return s
  return s
    .replace(/�blicas/g,'úblicas').replace(/�blico/g,'úblico')
    .replace(/�rganos/g,'Órganos').replace(/�reas/g,'Áreas')
    .replace(/�rea\b/g,'érea').replace(/�rcito/g,'ército')
    .replace(/�sticas/g,'ísticas').replace(/�stica/g,'ística')
    .replace(/�stico/g,'ístico').replace(/�stamo/g,'éstamo')
    .replace(/�ctimas/g,'íctimas').replace(/�ctima\b/g,'íctima')
    .replace(/�mulos/g,'ímulos').replace(/�culos/g,'ículos')
    .replace(/�culo/g,'ículo').replace(/�timos/g,'ítimos')
    .replace(/�veres/g,'áveres').replace(/�gicos/g,'ógicos')
    .replace(/�gico/g,'ógico').replace(/�gicas/g,'ógicas')
    .replace(/�gica/g,'ógica').replace(/�digo/g,'ódigo')
    .replace(/�dito/g,'édito').replace(/�dica/g,'édica')
    .replace(/�dico/g,'édico').replace(/�xico/g,'éxico')
    .replace(/�lica/g,'álica').replace(/�noma/g,'ónoma')
    .replace(/Ni�as/g,'Niñas').replace(/Ni�os/g,'Niños')
    .replace(/�as\b/g,'ías').replace(/�a\b/g,'ía')
    .replace(/�n\b/g,'ón').replace(/�/g,'ó')
}

function abreviarLey(ley, usedSet) {
  const name = normalizeLeyName(ley)
  if (LEY_ABREVS[name]) return LEY_ABREVS[name]
  const words = name.split(/[\s,.()+]+/).filter(w => w.length >= 3 && !STOP_WORDS.has(w.toLowerCase()))
  let abbrev = (words.length ? words.slice(0,5).map(w => w[0].toUpperCase()).join('') : name.slice(0,5).toUpperCase()).slice(0,5)
  if (usedSet) {
    let candidate = abbrev, i = 2
    while (usedSet.has(candidate)) candidate = abbrev + i++
    usedSet.add(candidate)
    return candidate
  }
  return abbrev
}

// ═══════════════════════════════════════════════
// D3 FORCE GRAPH — Obsidian-style
// ═══════════════════════════════════════════════
const NODE_COLOR = {
  caso:      '#C49A3C',
  tesis:     '#4A80F0',
  antitesis: '#E24B4A',
  neutral:   '#888880',
}
const LABEL_COLOR = {
  caso:      '#D4A55C',
  tesis:     '#A8CCFF',
  antitesis: '#FFB0B0',
  neutral:   '#C8C8C0',
}

let simulation = null
let graphRoot  = null
let zoomBehavior = null

function initSVG() {
  const svgEl = document.getElementById('atlas-svg')
  const wrap  = document.getElementById('canvas-wrap')
  const W = wrap.clientWidth, H = wrap.clientHeight
  const svg = d3.select(svgEl).attr('width', W).attr('height', H)

  // Background + stars
  svg.append('rect').attr('width', '100%').attr('height', '100%').attr('fill', '#050403')
  const stars = svg.append('g').attr('pointer-events', 'none')
  for (let i = 0; i < 220; i++) {
    stars.append('circle')
      .attr('cx', Math.random() * W).attr('cy', Math.random() * H)
      .attr('r', Math.random() * 1.1 + 0.2)
      .attr('fill', `rgba(240,236,228,${(0.1 + Math.random() * 0.35).toFixed(2)})`)
  }

  // Glow filters
  const defs = svg.append('defs')
  ;[['gold','196,154,60',4],['blue','74,128,240',5],['red','226,75,74',5]].forEach(([name, rgb, blur]) => {
    const f = defs.append('filter').attr('id', `glow-${name}`)
      .attr('x','-70%').attr('y','-70%').attr('width','240%').attr('height','240%')
    f.append('feGaussianBlur').attr('stdDeviation', blur).attr('result','blur')
    const m = f.append('feMerge')
    m.append('feMergeNode').attr('in','blur')
    m.append('feMergeNode').attr('in','SourceGraphic')
  })

  // Main group — target for zoom/pan
  graphRoot = svg.append('g').attr('class', 'graph-root')

  // Zoom/pan
  zoomBehavior = d3.zoom().scaleExtent([0.1, 5])
    .on('zoom', e => graphRoot.attr('transform', e.transform))
  svg.call(zoomBehavior)
  svg.on('dblclick.zoom', null) // disable double-click zoom

  // Zoom buttons
  document.getElementById('zoom-in-btn').onclick  = () => d3.select(svgEl).transition().duration(300).call(zoomBehavior.scaleBy, 1.5)
  document.getElementById('zoom-out-btn').onclick = () => d3.select(svgEl).transition().duration(300).call(zoomBehavior.scaleBy, 0.67)

  // Click on background → reset highlight
  svg.on('click', e => { if (e.target === svgEl || e.target.tagName === 'rect') resetHighlight() })

  window.addEventListener('resize', () => {
    const W2 = wrap.clientWidth, H2 = wrap.clientHeight
    svg.attr('width', W2).attr('height', H2)
    if (simulation) simulation.force('center', d3.forceCenter(W2/2, H2/2)).alpha(0.15).restart()
  })
}

function clearGraph() {
  if (simulation) { simulation.stop(); simulation = null }
  if (graphRoot) graphRoot.selectAll('*').remove()
}

function buildGraph(data, abrevMap) {
  clearGraph()
  const wrap = document.getElementById('canvas-wrap')
  const W = wrap.clientWidth, H = wrap.clientHeight
  const { tesis = [], antitesis = [], neutral = [] } = data

  // ── Build node + link arrays ──
  const nodes = [{ id: '__caso__', type: 'caso', r: 18, label: 'CASO' }]
  const links = []

  function addGroups(groups, cls) {
    groups.forEach(group => {
      const leyId = 'ley:' + group.ley
      const arts  = group.articulos || []
      const r     = Math.min(8 + Math.sqrt(arts.length) * 1.6, 17)
      const label = abrevMap ? abrevMap.get(group.ley) : abreviarLey(group.ley)
      nodes.push({ id: leyId, type: 'ley', cls, label, fullName: normalizeLeyName(group.ley), r, group, score: group.score_promedio || 0 })
      links.push({ source: '__caso__', target: leyId, cls: 'caso-ley', color: 'rgba(196,154,60,0.28)' })
      arts.forEach(art => {
        const artId = 'art:' + art.id
        nodes.push({ id: artId, type: 'art', cls: art.clasificacion || cls, label: art.numero_articulo || '', r: 4, art, parentLey: leyId })
        const alpha = '0.18'
        const artColor = cls === 'tesis' ? `rgba(74,128,240,${alpha})` : cls === 'antitesis' ? `rgba(226,75,74,${alpha})` : `rgba(136,136,128,${alpha})`
        links.push({ source: leyId, target: artId, cls: 'ley-art', color: artColor })
      })
    })
  }
  addGroups(tesis, 'tesis')
  addGroups(antitesis, 'antitesis')
  addGroups(neutral, 'neutral')

  // Scatter nodes near center before simulation starts
  nodes.forEach(d => { d.x = W/2 + (Math.random()-0.5)*180; d.y = H/2 + (Math.random()-0.5)*180 })

  // ── Force simulation ──
  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id)
      .distance(d => d.cls === 'caso-ley' ? 150 : 42)
      .strength(d => d.cls === 'caso-ley' ? 0.3 : 0.9))
    .force('charge', d3.forceManyBody()
      .strength(d => d.type === 'caso' ? -800 : d.type === 'ley' ? -260 : -60))
    .force('center', d3.forceCenter(W/2, H/2).strength(0.05))
    .force('collide', d3.forceCollide(d => d.r + 6).strength(0.8))

  // ── Render links ──
  const linkSel = graphRoot.append('g').attr('class', 'links')
    .selectAll('line').data(links).enter().append('line')
    .attr('stroke', d => d.color)
    .attr('stroke-width', d => d.cls === 'caso-ley' ? 1.4 : 0.8)

  // ── Render nodes ──
  const drag = d3.drag()
    .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y })
    .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y })
    .on('end',   (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null })

  const nodeSel = graphRoot.append('g').attr('class', 'nodes')
    .selectAll('g').data(nodes).enter().append('g')
    .attr('class', d => `gnode gnode-${d.type}`)
    .call(drag)
    .style('cursor', d => d.type === 'ley' ? 'pointer' : 'default')

  // Circles
  nodeSel.append('circle')
    .attr('r', d => d.r)
    .attr('fill', d => NODE_COLOR[d.type === 'caso' ? 'caso' : d.cls] || NODE_COLOR.neutral)
    .attr('fill-opacity', d => d.type === 'art' ? 0.5 : d.type === 'ley' ? 0.88 : 0.95)
    .attr('stroke', d => NODE_COLOR[d.type === 'caso' ? 'caso' : d.cls] || NODE_COLOR.neutral)
    .attr('stroke-width', d => d.type === 'ley' ? 1.5 : 0.5)
    .attr('stroke-opacity', 0.6)
    .attr('filter', d => {
      if (d.type === 'caso') return 'url(#glow-gold)'
      if (d.type === 'ley')  return d.cls === 'tesis' ? 'url(#glow-blue)' : d.cls === 'antitesis' ? 'url(#glow-red)' : 'none'
      return 'none'
    })

  // Labels on caso + ley nodes
  nodeSel.filter(d => d.type !== 'art')
    .append('text')
    .attr('dy', d => -(d.r + 5))
    .attr('text-anchor', 'middle')
    .attr('font-family', 'Fraunces, serif')
    .attr('font-size', d => d.type === 'caso' ? '10px' : '9px')
    .attr('font-weight', '700')
    .attr('letter-spacing', '0.08em')
    .attr('fill', d => LABEL_COLOR[d.type === 'caso' ? 'caso' : d.cls] || LABEL_COLOR.neutral)
    .attr('paint-order', 'stroke')
    .attr('stroke', '#050403')
    .attr('stroke-width', '3px')
    .style('pointer-events', 'none')
    .text(d => d.label)

  // ── Tooltip ──
  const tooltip = document.getElementById('planet-tooltip')

  nodeSel.filter(d => d.type === 'ley')
    .on('mouseover', (e, d) => {
      const col = NODE_COLOR[d.cls] || NODE_COLOR.neutral
      document.getElementById('tt-ley-nombre').textContent = d.fullName
      document.getElementById('tt-ley-nombre').style.color = col
      document.getElementById('tt-stats').textContent = `${d.group.total_articulos} § · ${Math.round(d.score * 100)}% relevante`
      document.getElementById('tt-tipo').textContent = d.cls.toUpperCase()
      document.getElementById('tt-tipo').style.color = col
      tooltip.classList.add('visible')
    })
    .on('mousemove', e => {
      tooltip.style.left = Math.min(e.clientX + 14, window.innerWidth  - 280) + 'px'
      tooltip.style.top  = Math.min(e.clientY + 14, window.innerHeight - 100) + 'px'
    })
    .on('mouseout', () => tooltip.classList.remove('visible'))
    .on('click', (e, d) => { e.stopPropagation(); highlightNode(d.id); mostrarDetalle(d.group, d.cls) })

  nodeSel.filter(d => d.type === 'art')
    .on('mouseover', (e, d) => {
      const col = NODE_COLOR[d.cls] || NODE_COLOR.neutral
      const preview = (d.art?.texto_original || '').slice(0, 100)
      document.getElementById('tt-ley-nombre').textContent = d.art?.numero_articulo || d.label
      document.getElementById('tt-ley-nombre').style.color = col
      document.getElementById('tt-stats').textContent = preview + (preview.length === 100 ? '…' : '')
      document.getElementById('tt-tipo').textContent = d.cls.toUpperCase()
      document.getElementById('tt-tipo').style.color = col
      tooltip.classList.add('visible')
    })
    .on('mousemove', e => {
      tooltip.style.left = Math.min(e.clientX + 14, window.innerWidth  - 280) + 'px'
      tooltip.style.top  = Math.min(e.clientY + 14, window.innerHeight - 100) + 'px'
    })
    .on('mouseout', () => tooltip.classList.remove('visible'))

  // ── Tick ──
  simulation.on('tick', () => {
    linkSel
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y)
    nodeSel.attr('transform', d => `translate(${d.x ?? 0},${d.y ?? 0})`)
  })
}

function highlightNode(leyId) {
  if (!graphRoot) return

  // Collect article IDs that belong to this law
  const artIds = new Set()
  graphRoot.selectAll('.gnode-art').each(d => { if (d.parentLey === leyId) artIds.add(d.id) })

  // Dim everything, then highlight the selected cluster
  graphRoot.selectAll('.gnode circle')
    .attr('fill-opacity', d => {
      if (d.id === '__caso__' || d.id === leyId) return d.type === 'ley' ? 0.95 : 0.95
      if (artIds.has(d.id)) return 0.65
      return 0.1
    })

  graphRoot.selectAll('.links line')
    .attr('stroke-opacity', d => {
      const s = d.source.id || d.source
      const t = d.target.id || d.target
      if (s === '__caso__' && t === leyId) return 0.9
      if (s === leyId) return 0.7
      return 0.04
    })

  document.querySelectorAll('.ley-item').forEach(el => {
    el.classList.toggle('active', el.dataset.leyId === leyId)
  })
}

function resetHighlight() {
  if (!graphRoot) return
  graphRoot.selectAll('.gnode circle')
    .attr('fill-opacity', d => d.type === 'art' ? 0.5 : d.type === 'ley' ? 0.88 : 0.95)
  graphRoot.selectAll('.links line')
    .attr('stroke-opacity', 1)
  document.querySelectorAll('.ley-item').forEach(el => el.classList.remove('active'))
  cerrarDetalle()
}

// LAW DETAIL PANEL
// ═══════════════════════════════════════════════
function mostrarDetalle(group, type) {
  const color = { tesis: '#4A80F0', antitesis: '#E05050', neutral: 'var(--gold)' }[type] || 'var(--gold)'
  document.getElementById('detail-ley-titulo').textContent = group.ley.toUpperCase()
  document.getElementById('detail-ley-titulo').style.color = color
  document.getElementById('detail-ley-sub').textContent =
    `${group.total_articulos} § · ${Math.round(group.score_promedio * 100)}% relevancia`

  const list = document.getElementById('detail-arts-list')
  list.innerHTML = ''
  ;(group.articulos || []).forEach(art => {
    const div    = document.createElement('div')
    div.className = 'ley-detail-art'
    const txtId  = 'atxt-' + art.id
    const texto  = art.texto_original || ''
    const preview = texto.slice(0, 200)
    const hayMas  = texto.length > 200
    div.innerHTML = `
      <div class="ley-detail-art-header">
        <span class="ley-detail-art-num" style="color:${color}">${art.numero_articulo || 'Art.'}</span>
        <span class="ley-detail-art-badge ${art.clasificacion || type}">${(art.clasificacion || type).toUpperCase()}</span>
        <span style="margin-left:auto;font-family:'Fraunces',serif;font-size:9px;color:var(--gold)">${Math.round((art.similarity || 0) * 100)}%</span>
      </div>
      <div class="ley-detail-art-texto" id="${txtId}">${preview}${hayMas ? '…' : ''}</div>
      ${hayMas ? `<button class="ley-detail-art-ver" onclick="toggleArtTexto('${txtId}',this)">Leer completo ▼</button>` : ''}
    `
    list.appendChild(div)
  })
  document.getElementById('ley-detail').classList.add('open')
}

function cerrarDetalle() {
  document.getElementById('ley-detail').classList.remove('open')
}

function toggleArtTexto(id, btn) {
  const el = document.getElementById(id)
  el.classList.toggle('expandido')
  btn.textContent = el.classList.contains('expandido') ? 'Cerrar ▲' : 'Leer completo ▼'
}

// ═══════════════════════════════════════════════
// ANALYSIS
// ═══════════════════════════════════════════════
let atlasAbortController = null

function setAnalizando(on) {
  document.getElementById('btn-atlas').style.display  = on ? 'none' : ''
  document.getElementById('btn-abort').style.display  = on ? ''     : 'none'
  document.getElementById('panel-loading').style.display = on ? 'block' : 'none'
}

function abortarAtlas() {
  if (atlasAbortController) atlasAbortController.abort()
}

async function analizarAtlas() {
  const caso   = document.getElementById('caso-input').value.trim()
  const pais   = paisSelect.value
  const estado = estadoSelect.style.display !== 'none' ? estadoSelect.value : null

  if (caso.length < 20) { alert('Describe tu caso con más detalle.'); return }
  if (!pais)            { alert('Selecciona un país.'); return }

  atlasAbortController = new AbortController()
  const timeoutId = setTimeout(() => atlasAbortController.abort(), 120000)

  setAnalizando(true)
  document.getElementById('panel-results').innerHTML = ''
  document.getElementById('canvas-empty').style.display = 'none'
  cerrarDetalle()
  clearGraph()

  try {
    const res = await fetch('/api/atlas', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ caso, pais, estado_mx: estado }),
      signal: atlasAbortController.signal
    })
    if (!res.ok) {
      const err = await res.json().catch(() => ({}))
      throw new Error(err.error || `HTTP ${res.status}`)
    }
    renderResultados(await res.json())
  } catch (err) {
    if (err.name === 'AbortError') {
      document.getElementById('canvas-empty').style.display = 'flex'
    } else {
      console.error('[atlas]', err)
      alert('Error al analizar: ' + err.message)
      document.getElementById('canvas-empty').style.display = 'flex'
    }
  } finally {
    clearTimeout(timeoutId)
    atlasAbortController = null
    setAnalizando(false)
  }
}

function renderResultados(data) {
  const { tesis = [], antitesis = [], neutral = [] } = data
  const total = tesis.length + antitesis.length + neutral.length

  if (total === 0) {
    alert('No se encontraron leyes relevantes. Intenta con más detalle.')
    document.getElementById('canvas-empty').style.display = 'flex'
    return
  }

  // Pre-compute unique abbreviations across all groups
  const abrevUsed = new Set(Object.values(LEY_ABREVS))
  const abrevMap  = new Map()
  ;[...tesis, ...antitesis, ...neutral].forEach(g => {
    if (!abrevMap.has(g.ley)) abrevMap.set(g.ley, abreviarLey(g.ley, abrevUsed))
  })

  buildGraph(data, abrevMap)

  const container = document.getElementById('panel-results')
  container.innerHTML = ''

  function renderSection(label, groups, type) {
    if (!groups.length) return
    const sec = document.createElement('div')
    sec.innerHTML = `<div class="ley-section-label ${type}">${label} · ${groups.length}</div>`
    groups.forEach(group => {
      const leyId   = 'ley:' + group.ley
      const nombre  = normalizeLeyName(group.ley)
      const item    = document.createElement('div')
      item.className       = 'ley-item ' + type
      item.dataset.leyId   = leyId
      item.dataset.leyName = group.ley
      item.innerHTML = `
        <div class="ley-item-row1">
          <span class="ley-abrev">${abrevMap.get(group.ley)}</span>
          <span class="ley-nombre">${nombre}</span>
        </div>
        <div class="ley-item-meta">
          <span class="ley-arts-badge">${group.total_articulos} §</span>
          <span class="ley-score-badge">${Math.round(group.score_promedio * 100)}% relevante</span>
        </div>
      `
      item.addEventListener('click', () => { highlightNode(leyId); mostrarDetalle(group, type) })
      sec.appendChild(item)
    })
    container.appendChild(sec)
  }

  renderSection('TESIS', tesis, 'tesis')
  renderSection('ANTÍTESIS', antitesis, 'antitesis')
  if (neutral.length) renderSection('NEUTRAL', neutral, 'neutral')
}

function toggleTema() {
  var t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'
  document.documentElement.setAttribute('data-theme', t)
  localStorage.setItem('la-theme', t)
  document.getElementById('tema-btn').textContent = t === 'dark' ? '◑' : '●'
}
;(function() {
  var t = document.documentElement.getAttribute('data-theme') || 'light'
  var btn = document.getElementById('tema-btn')
  if (btn) btn.textContent = t === 'dark' ? '◑' : '●'
})()

function openSidebar()       { document.getElementById('la-sidebar').classList.add('open'); document.getElementById('sidebar-overlay').classList.add('open'); document.body.style.overflow = 'hidden' }
function closeSidebar()      { document.getElementById('la-sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('open'); document.body.style.overflow = '' }
function toggleLangDropdown() { document.getElementById('lang-dropdown').classList.toggle('open') }
function closeLangDropdown()  { document.getElementById('lang-dropdown').classList.remove('open') }
document.addEventListener('click', e => { if (!e.target.closest('#lang-switcher')) closeLangDropdown() })

// Init graph canvas
initSVG()
</script>
