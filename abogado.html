<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legal Atlas — Apolo Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    :root {
      --bg-deep:    #08080a;
      --bg-card:    #0d0d0f;
      --bg-raised:  #141416;
      --gold:       #c49a3c;
      --gold-light: #e8c878;
      --gold-dim:   rgba(196,154,60,0.15);
      --gold-glow:  rgba(196,154,60,0.4);
      --text:       rgba(245,237,216,0.92);
      --text-soft:  rgba(245,237,216,0.6);
      --text-muted: rgba(245,237,216,0.35);
      --border:     rgba(196,154,60,0.12);
      --border-hov: rgba(196,154,60,0.35);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--bg-deep);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ═══ SCROLLBARS ═══ */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: rgba(196,154,60,0.25);
      border-radius: 2px;
    }
    ::-webkit-scrollbar-thumb:hover { background: rgba(196,154,60,0.45); }

    /* ═══ TOPBAR ═══ */
    .topbar {
      height: 58px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 16px;
      background: rgba(8,8,10,0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 100;
    }

    .topbar-logo {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      color: var(--text);
      text-decoration: none;
    }
    .topbar-logo span { color: var(--gold); font-weight: 400; }

    .topbar-back {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .topbar-back:hover { color: var(--gold); }

    .apolo-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .apolo-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 10px var(--gold-glow);
      animation: pulse-dot 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.6; transform: scale(0.85); }
    }

    /* ═══ PANEL (3 columns) ═══ */
    .panel {
      display: flex;
      flex-direction: row;
      height: calc(100vh - 58px);
      overflow: hidden;
    }

    /* ═══ LEFT COLUMN — NAV ═══ */
    .col-nav {
      width: 280px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    .nav-controls {
      flex-shrink: 0;
      padding: 16px 14px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: var(--bg-card);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav-label {
      font-family: 'Cinzel', serif;
      font-size: 7.5px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(196,154,60,0.45);
      margin-bottom: 4px;
    }

    .nav-select {
      width: 100%;
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--text-soft);
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 9px 14px;
      cursor: pointer;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      transition: border-color 0.2s;
    }
    .nav-select:focus { border-color: var(--gold); color: var(--text); }
    .nav-select:disabled { opacity: 0.4; cursor: not-allowed; }
    .nav-select option { background: #0d0d0f; color: var(--text); }

    .search-row {
      display: flex;
      gap: 6px;
    }
    .search-input {
      flex: 1;
      font-family: 'Lora', serif;
      font-size: 12px;
      color: var(--text);
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input::placeholder { color: var(--text-muted); font-style: italic; }
    .search-input:focus { border-color: var(--gold); }
    .btn-search {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.1em;
      color: #08080a;
      background: var(--gold);
      border: none;
      border-radius: 12px;
      padding: 8px 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      flex-shrink: 0;
    }
    .btn-search:hover { background: var(--gold-light); transform: scale(1.03); }

    /* Search results */
    #search-resultados {
      padding: 0 14px 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .search-result-item {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.06em;
      color: var(--text-soft);
      padding: 7px 12px;
      border-radius: 10px;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
      line-height: 1.5;
    }
    .search-result-item:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: var(--gold-dim);
    }
    .search-result-sub {
      font-size: 8px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Nav tree */
    .nav-tree {
      flex: 1;
      overflow-y: auto;
      padding: 10px 8px 20px;
    }

    .nav-placeholder {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-transform: uppercase;
      text-align: center;
      padding: 28px 16px;
      line-height: 2;
    }

    .nav-loading {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.15em;
      color: rgba(196,154,60,0.5);
      text-transform: uppercase;
      padding: 12px 16px;
    }

    /* Accordion — nivel primario */
    .acord-item {
      margin-bottom: 4px;
    }
    .acord-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 12px;
      background: transparent;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Cinzel', serif;
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-soft);
      width: 100%;
      text-align: left;
    }
    .acord-header:hover {
      background: var(--gold-dim);
      border-color: var(--border);
      color: var(--gold);
    }
    .acord-header.open {
      background: var(--gold-dim);
      border-color: rgba(196,154,60,0.25);
      color: var(--gold);
    }
    .acord-arrow {
      font-size: 10px;
      transition: transform 0.25s;
      flex-shrink: 0;
      opacity: 0.7;
    }
    .acord-header.open .acord-arrow { transform: rotate(90deg); }

    .acord-body {
      display: none;
      padding-left: 10px;
      margin-top: 2px;
    }
    .acord-body.open { display: block; }

    /* Sub-accordion — nivel secundario */
    .sub-acord-item {
      margin-bottom: 3px;
    }
    .sub-acord-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 10px;
      background: transparent;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Lora', serif;
      font-size: 11px;
      font-style: italic;
      color: var(--text-muted);
      width: 100%;
      text-align: left;
    }
    .sub-acord-header:hover {
      background: rgba(196,154,60,0.08);
      border-color: var(--border);
      color: var(--text-soft);
    }
    .sub-acord-header.open {
      background: rgba(196,154,60,0.08);
      border-color: var(--border);
      color: var(--text-soft);
    }
    .sub-arrow {
      font-size: 9px;
      transition: transform 0.2s;
      flex-shrink: 0;
      opacity: 0.5;
    }
    .sub-acord-header.open .sub-arrow { transform: rotate(90deg); }

    .sub-acord-body {
      display: none;
      padding-left: 8px;
      margin-top: 2px;
    }
    .sub-acord-body.open { display: block; }

    /* Article links */
    .art-link {
      display: block;
      padding: 7px 12px;
      border-radius: 10px;
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      border-left: 2px solid transparent;
      margin-bottom: 2px;
    }
    .art-link:hover {
      color: var(--gold);
      background: var(--gold-dim);
      border-left-color: rgba(196,154,60,0.4);
    }
    .art-link.activo {
      color: var(--gold);
      background: var(--gold-dim);
      border-left-color: var(--gold);
    }

    /* ═══ CENTER COLUMN ═══ */
    .col-centro {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #f5edd8;
      overflow: hidden;
      border-right: 1px solid rgba(138,104,32,0.2);
    }

    .centro-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 32px 36px 40px;
    }

    /* Empty state */
    .centro-vacio {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 20px;
      text-align: center;
      padding: 40px;
    }
    .vacio-symbol {
      width: 80px;
      height: 80px;
      border: 1px solid rgba(138,104,32,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: 28px;
      color: rgba(138,104,32,0.4);
      background: rgba(138,104,32,0.06);
    }
    .vacio-title {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(26,21,8,0.4);
    }

    /* Article view */
    #articulo-vista {
      display: none;
    }
    .breadcrumb {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(26,21,8,0.4);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .breadcrumb-sep { color: rgba(138,104,32,0.35); }
    .breadcrumb span:last-child { color: #8a6820; }

    .art-numero {
      font-family: 'Cinzel', serif;
      font-size: 52px;
      font-weight: 700;
      color: #8a6820;
      line-height: 1;
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }
    .art-ley-info {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(26,21,8,0.4);
      margin-bottom: 28px;
    }
    .art-texto {
      font-family: 'Lora', Georgia, serif;
      font-size: 15px;
      line-height: 1.9;
      color: #1a1508;
      max-width: 640px;
      margin-bottom: 36px;
      border-left: 2px solid rgba(138,104,32,0.25);
      padding-left: 20px;
    }

    .art-acciones {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .btn-accion {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 12px 22px;
      border-radius: 12px;
      border: 1px solid var(--gold);
      background: transparent;
      color: var(--gold);
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-accion:hover {
      background: var(--gold-dim);
      border-color: var(--gold-light);
      color: var(--gold-light);
    }
    .btn-accion.primary {
      background: #8a6820;
      color: #f5edd8;
      border-color: #8a6820;
    }
    .btn-accion.primary:hover {
      background: var(--gold-light);
      border-color: var(--gold-light);
    }

    /* Section view */
    #seccion-vista {
      display: none;
      padding: 28px 32px;
    }
    .seccion-header {
      font-family: 'Cinzel', serif;
      color: #8a6820;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(138,104,32,0.2);
    }
    .art-card {
      padding: 18px 0;
      border-bottom: 1px solid rgba(138,104,32,0.12);
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .art-card:hover { opacity: 0.65; }
    .art-card-numero {
      font-family: 'Cinzel', serif;
      color: #8a6820;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .art-card-preview {
      font-family: 'Lora', Georgia, serif;
      color: #1a1508;
      font-size: 14px;
      line-height: 1.75;
    }
    .seccion-acciones {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid rgba(138,104,32,0.15);
    }

    /* Whiteboard */
    #whiteboard {
      display: none;
      background: #0f0f11;
      min-height: 100%;
      padding: 28px 32px;
    }
    .wb-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      margin-bottom: 24px;
      padding: 0;
      transition: color 0.2s;
    }
    .wb-back { color: rgba(245,237,216,0.4); }
    .wb-back:hover { color: var(--gold); }

    .wb-titulo {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .wb-frame {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      min-height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .wb-frame svg {
      max-width: 100%;
      height: auto;
    }
    .wb-loading {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(196,154,60,0.5);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .wb-spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(196,154,60,0.2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .wb-caption {
      font-family: 'Cinzel', serif;
      font-size: 8.5px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-align: center;
    }
    .wb-caption.gold { color: rgba(196,154,60,0.6); }

    /* ═══ RIGHT COLUMN — CHAT ═══ */
    .col-chat {
      width: 300px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg-card);
      height: 100%;
    }

    .chat-header {
      flex-shrink: 0;
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--border);
    }
    .chat-header-title {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 6px;
    }
    .chat-context {
      font-family: 'Cinzel', serif;
      font-size: 8px;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      text-transform: uppercase;
      min-height: 14px;
      transition: color 0.3s;
    }
    .chat-context.activo { color: rgba(196,154,60,0.6); }

    #chat-mensajes {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: rgba(8,8,10,0.5);
    }

    .msg {
      font-size: 13px;
      line-height: 1.75;
      font-family: 'Lora', serif;
    }
    .msg-sender {
      font-family: 'Cinzel', serif;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .msg-apolo {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px 16px 16px 16px;
      padding: 12px 14px;
      align-self: flex-start;
      color: var(--text);
      max-width: 92%;
    }
    .msg-apolo .msg-sender { color: var(--gold); }
    .msg-usuario {
      background: rgba(196,154,60,0.1);
      color: var(--text);
      border: 1px solid rgba(196,154,60,0.2);
      border-radius: 16px 4px 16px 16px;
      padding: 10px 14px;
      align-self: flex-end;
      max-width: 92%;
    }
    .msg-usuario .msg-sender { color: var(--text-muted); }

    .typing-dots {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 2px 0;
    }
    .typing-dots span {
      width: 5px; height: 5px;
      background: var(--gold);
      border-radius: 50%;
      opacity: 0.5;
      animation: bounce-dot 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce-dot {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30%            { transform: translateY(-5px); opacity: 1; }
    }

    /* Chat input */
    .chat-input-area {
      flex-shrink: 0;
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      background: rgba(8,8,10,0.8);
    }
    .chat-input-row {
      display: flex;
      gap: 6px;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 3px;
      transition: border-color 0.2s;
    }
    .chat-input-row:focus-within { border-color: var(--border-hov); }
    #chat-input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 9px 12px;
      font-size: 13px;
      font-family: 'Lora', serif;
      color: var(--text);
      outline: none;
      border-radius: 11px;
      resize: none;
      min-height: 38px;
      max-height: 100px;
    }
    #chat-input::placeholder { color: var(--text-muted); font-style: italic; }
    .btn-send {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: var(--gold);
      color: #08080a;
      border: none;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
      align-self: flex-end;
    }
    .btn-send:hover { background: var(--gold-light); transform: scale(1.05); }
    .btn-send:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    /* Article tags in chat */
    .art-tags-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }
    .art-tag {
      font-family: 'Cinzel', serif;
      font-size: 8px;
      letter-spacing: 0.08em;
      padding: 3px 8px;
      border-radius: 20px;
      border: 1px solid rgba(196,154,60,0.3);
      background: var(--gold-dim);
      color: var(--gold);
    }

    /* Divider inside nav */
    .nav-divider {
      height: 1px;
      background: var(--border);
      margin: 8px 0;
    }

    /* Optgroup styling */
    .nav-select optgroup {
      font-family: 'Cinzel', serif;
      font-size: 8px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(196,154,60,0.5);
      background: #0d0d0f;
    }
    .nav-select option {
      font-family: 'Lora', serif;
      font-size: 12px;
      background: #0d0d0f;
      color: rgba(245,237,216,0.88);
    }

    /* Bookmarks */
    .bookmarks-section {
      padding: 10px 14px 4px;
      border-bottom: 1px solid var(--border);
    }
    .bookmarks-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: 'Cinzel', serif;
      font-size: 8px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
      opacity: 0.7;
    }
    .bookmarks-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .bookmark-chip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 10px;
      background: var(--gold-dim);
      border: 1px solid rgba(196,154,60,0.2);
      cursor: pointer;
      transition: all 0.2s;
    }
    .bookmark-chip:hover { background: rgba(196,154,60,0.22); border-color: var(--gold); }
    .bookmark-chip-label {
      font-family: 'Cinzel', serif;
      font-size: 8.5px;
      letter-spacing: 0.08em;
      color: var(--text-soft);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .bookmark-chip-del {
      font-size: 10px;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0 2px;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .bookmark-chip-del:hover { color: var(--gold); }

    /* Bookmark toggle button */
    .btn-bookmark {
      width: 30px; height: 30px;
      border-radius: 8px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
      margin-bottom: 1px;
    }
    .btn-bookmark:hover { border-color: var(--gold); color: var(--gold); }
    .btn-bookmark.guardado { color: var(--gold); border-color: var(--gold); background: var(--gold-dim); }

    /* Responsive fallback */
    @media (max-width: 900px) {
      .col-nav { width: 220px; }
      .col-chat { width: 240px; }
      .centro-scroll { padding: 20px 20px 32px; }
      .art-numero { font-size: 38px; }
    }
  </style>
</head>
<body>

  <!-- ═══ TOPBAR ═══ -->
  <header class="topbar">
    <a class="topbar-logo" href="index.html">LEGAL<span>ATLAS</span></a>
    <a class="topbar-back" href="index.html">← Inicio</a>
    <div class="apolo-badge">
      <div class="apolo-dot"></div>
      APOLO · Pro
    </div>
  </header>

  <!-- ═══ PANEL ═══ -->
  <div class="panel">

    <!-- ── LEFT: NAV ── -->
    <aside class="col-nav">

      <!-- Mis Leyes (bookmarks) -->
      <div class="bookmarks-section" id="bookmarks-section" style="display:none">
        <div class="bookmarks-header">☆ Mis Leyes</div>
        <div class="bookmarks-list" id="bookmarks-list"></div>
      </div>

      <div class="nav-controls">
        <div>
          <div class="nav-label">País</div>
          <select id="sel-pais" class="nav-select">
            <option value="">Cargando…</option>
          </select>
        </div>
        <div>
          <div class="nav-label">Ley</div>
          <select id="sel-ley" class="nav-select" disabled>
            <option value="">Selecciona un país</option>
          </select>
        </div>
        <div id="grupo-estado" style="display:none">
          <div class="nav-label">Estado</div>
          <select id="sel-estado" class="nav-select">
            <option value="">Todos los estados…</option>
          </select>
        </div>
        <div>
          <div class="nav-label">Buscar artículo</div>
          <div style="display:flex;gap:6px;align-items:center">
            <div class="search-row" style="flex:1">
              <input type="text" id="inp-buscar" class="search-input" placeholder="Ej. 2273…">
              <button class="btn-search" onclick="buscarArticulo()">Ir</button>
            </div>
            <button class="btn-bookmark" id="btn-bookmark" onclick="toggleBookmark()" title="Guardar en Mis Leyes" style="display:none">☆</button>
          </div>
        </div>
      </div>

      <div id="search-resultados"></div>

      <div class="nav-tree" id="arbol">
        <div class="nav-placeholder">Selecciona un país<br>y una ley</div>
      </div>

    </aside>

    <!-- ── CENTER ── -->
    <main class="col-centro">
      <div class="centro-scroll" id="centro-scroll">

        <!-- Empty state -->
        <div class="centro-vacio" id="centro-vacio">
          <div class="vacio-symbol">⚖</div>
          <div class="vacio-title">Selecciona un artículo del navegador</div>
        </div>

        <!-- Article view -->
        <div id="articulo-vista">
          <div class="breadcrumb" id="breadcrumb"></div>
          <div class="art-numero" id="art-numero"></div>
          <div class="art-ley-info" id="art-ley-info"></div>
          <div class="art-texto" id="art-texto"></div>
          <div class="art-acciones">
            <button class="btn-accion primary" onclick="explicarCapitulo()">✦ Explícame este capítulo</button>
            <a class="btn-accion" href="ciudadano.html">✍ Redactar con este artículo</a>
          </div>
        </div>

        <!-- Section view -->
        <div id="seccion-vista">
          <div class="seccion-header" id="seccion-titulo"></div>
          <div id="seccion-articulos"></div>
        </div>

        <!-- Whiteboard -->
        <div id="whiteboard">
          <button class="wb-back" onclick="volverAlArticulo()">← Volver al artículo</button>
          <div class="wb-titulo" id="wb-titulo"></div>
          <div class="wb-frame" id="wb-frame">
            <div class="wb-loading">
              <div class="wb-spinner"></div>
              Generando diagrama…
            </div>
          </div>
          <div class="wb-caption" id="wb-caption">Generando…</div>
        </div>

      </div>
    </main>

    <!-- ── RIGHT: CHAT ── -->
    <aside class="col-chat">
      <div class="chat-header">
        <div class="chat-header-title">APOLO</div>
        <div class="chat-context" id="chat-context">Sin artículo activo</div>
      </div>

      <div id="chat-mensajes"></div>

      <div class="chat-input-area">
        <div class="chat-input-row">
          <textarea
            id="chat-input"
            placeholder="Pregunta sobre este artículo…"
            rows="1"
            onkeydown="chatKeydown(event)"
          ></textarea>
          <button class="btn-send" id="btn-send" onclick="enviarChat()">➤</button>
        </div>
      </div>
    </aside>

  </div><!-- /panel -->

  <script>
    // ═══════════════════════════════════════════════════════════
    //  STATE
    // ═══════════════════════════════════════════════════════════
    let paisActivo    = '';
    let estadoActivo  = '';
    let leyActiva     = '';
    let articuloActivo    = null;
    let capituloArticulos = [];
    let chatBloqueado     = false;

    // ═══════════════════════════════════════════════════════════
    //  INIT
    // ═══════════════════════════════════════════════════════════
    document.addEventListener('DOMContentLoaded', () => {
      cargarPaises();
      renderBookmarks();
      mostrarSaludo();
      autoResizeTextarea();
    });

    function autoResizeTextarea() {
      const ta = document.getElementById('chat-input');
      ta.addEventListener('input', () => {
        ta.style.height = 'auto';
        ta.style.height = Math.min(ta.scrollHeight, 100) + 'px';
      });
    }

    // ═══════════════════════════════════════════════════════════
    //  CASCADA: País → Ley → Estado (opcional)
    // ═══════════════════════════════════════════════════════════
    async function cargarPaises() {
      const sel = document.getElementById('sel-pais');
      try {
        const res  = await fetch('/api/abogado?action=paises');
        const json = await res.json();
        const paises = json.paises || [];
        const dn = new Intl.DisplayNames(['es'], { type: 'region' });
        sel.innerHTML = '<option value="">— Selecciona país —</option>';
        paises.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p;
          try { opt.textContent = dn.of(p); } catch { opt.textContent = p; }
          sel.appendChild(opt);
        });
      } catch (err) {
        sel.innerHTML = '<option value="">Error al cargar</option>';
        console.error('[cargarPaises]', err);
      }
      sel.addEventListener('change', onPaisChange);
    }

    async function onPaisChange() {
      paisActivo   = document.getElementById('sel-pais').value;
      estadoActivo = '';
      leyActiva    = '';
      articuloActivo = null;
      capituloArticulos = [];

      const selLey    = document.getElementById('sel-ley');
      const selEstado = document.getElementById('sel-estado');
      const grupoEst  = document.getElementById('grupo-estado');

      selLey.innerHTML = '<option value="">Cargando leyes…</option>';
      selLey.disabled = true;
      grupoEst.style.display = 'none';
      selEstado.innerHTML = '<option value="">Todos los estados…</option>';
      limpiarArbol();
      ocultarResultadosBusqueda();
      actualizarBookmarkBtn();

      if (!paisActivo) {
        selLey.innerHTML = '<option value="">Selecciona un país</option>';
        return;
      }

      try {
        const res  = await fetch(`/api/abogado?action=leyes&pais=${enc(paisActivo)}`);
        const json = await res.json();
        const leyes = json.leyes || [];

        selLey.innerHTML = '<option value="">— Selecciona ley —</option>';

        const federales = leyes.filter(l => l.tipo === 'federal');
        const estatales = leyes.filter(l => l.tipo === 'estatal');

        function agregarGrupo(label, lista) {
          if (!lista.length) return;
          const grp = document.createElement('optgroup');
          grp.label = label;
          lista.forEach(l => {
            const opt = document.createElement('option');
            opt.value = l.ley;
            opt.textContent = l.ley;
            opt.dataset.tipo = l.tipo;
            grp.appendChild(opt);
          });
          selLey.appendChild(grp);
        }

        agregarGrupo('Leyes Federales', federales);
        agregarGrupo('Leyes Estatales', estatales);

        selLey.disabled = false;
      } catch (err) {
        selLey.innerHTML = '<option value="">Error al cargar</option>';
        console.error('[onPaisChange]', err);
      }

      selLey.onchange = onLeyChange;
    }

    async function onLeyChange() {
      leyActiva    = document.getElementById('sel-ley').value;
      estadoActivo = '';
      articuloActivo    = null;
      capituloArticulos = [];

      const selEstado = document.getElementById('sel-estado');
      const grupoEst  = document.getElementById('grupo-estado');
      grupoEst.style.display = 'none';
      selEstado.innerHTML = '<option value="">Todos los estados…</option>';
      limpiarArbol();
      ocultarResultadosBusqueda();
      actualizarBookmarkBtn();

      if (!leyActiva) return;

      // Detectar tipo desde el option seleccionado (data-tipo)
      const selLeyEl    = document.getElementById('sel-ley');
      const optSelected = selLeyEl.options[selLeyEl.selectedIndex];
      const tipoLey     = optSelected?.dataset?.tipo || 'federal';

      if (tipoLey === 'estatal') {
        try {
          const res  = await fetch(`/api/abogado?action=estados_por_ley&pais=${enc(paisActivo)}&ley=${enc(leyActiva)}`);
          const json = await res.json();
          const estados = json.estados || [];
          if (estados.length > 0) {
            selEstado.innerHTML = '<option value="">Todos los estados…</option>';
            estados.forEach(e => {
              const opt = document.createElement('option');
              opt.value = e; opt.textContent = e;
              selEstado.appendChild(opt);
            });
            grupoEst.style.display = 'block';
            selEstado.onchange = onEstadoChange;
          }
        } catch (err) {
          console.warn('[onLeyChange] estados_por_ley falló:', err);
        }
      }

      await cargarNivelesPrimarios();
    }

    function onEstadoChange() {
      estadoActivo = document.getElementById('sel-estado').value;
      actualizarBookmarkBtn();
      limpiarArbol();
      cargarNivelesPrimarios();
    }

    // ═══════════════════════════════════════════════════════════
    //  ACCORDION — Nivel Primario
    // ═══════════════════════════════════════════════════════════
    async function cargarNivelesPrimarios() {
      const arbol = document.getElementById('arbol');
      arbol.innerHTML = '<div class="nav-loading">Cargando…</div>';

      try {
        const res  = await fetch(`/api/abogado?action=niveles_primarios&pais=${enc(paisActivo)}&ley=${enc(leyActiva)}&estado=${enc(estadoActivo)}`);
        const json = await res.json();
        const niveles = json.niveles_primarios || [];

        arbol.innerHTML = '';

        if (niveles.length === 0) {
          arbol.innerHTML = '<div class="nav-placeholder">Sin estructura encontrada</div>';
          return;
        }

        niveles.forEach(np => {
          const item = document.createElement('div');
          item.className = 'acord-item';

          const header = document.createElement('button');
          header.className = 'acord-header';
          header.innerHTML = `<span>${np}</span><span class="acord-arrow">›</span>`;

          const body = document.createElement('div');
          body.className = 'acord-body';
          body.dataset.loaded = 'false';
          body.dataset.np = np;

          header.addEventListener('click', () => {
            const isOpen = header.classList.contains('open');
            header.classList.toggle('open', !isOpen);
            body.classList.toggle('open', !isOpen);
            if (!isOpen && body.dataset.loaded === 'false') {
              cargarNivelesSecundarios(body, np);
            }
          });

          item.appendChild(header);
          item.appendChild(body);
          arbol.appendChild(item);
        });

      } catch (err) {
        arbol.innerHTML = '<div class="nav-placeholder">Error cargando estructura</div>';
        console.error('[cargarNivelesPrimarios]', err);
      }
    }

    // ═══════════════════════════════════════════════════════════
    //  SUB-ACCORDION — Nivel Secundario
    // ═══════════════════════════════════════════════════════════
    async function cargarNivelesSecundarios(container, nivelPrimario) {
      container.innerHTML = '<div class="nav-loading" style="padding-left:12px">Cargando…</div>';
      container.dataset.loaded = 'true';

      try {
        const res  = await fetch(`/api/abogado?action=niveles_secundarios&pais=${enc(paisActivo)}&ley=${enc(leyActiva)}&estado=${enc(estadoActivo)}&nivel_primario=${enc(nivelPrimario)}`);
        const json = await res.json();
        const niveles = json.niveles_secundarios || [];

        container.innerHTML = '';

        if (niveles.length === 0) {
          container.innerHTML = '<div class="nav-loading" style="padding-left:12px;color:var(--text-muted)">Sin capítulos</div>';
          return;
        }

        niveles.forEach(ns => {
          const item = document.createElement('div');
          item.className = 'sub-acord-item';

          const header = document.createElement('button');
          header.className = 'sub-acord-header';
          header.innerHTML = `<span>${ns}</span><span class="sub-arrow">›</span>`;

          const body = document.createElement('div');
          body.className = 'sub-acord-body';
          body.dataset.loaded = 'false';
          body.dataset.ns = ns;

          header.addEventListener('click', () => {
            const isOpen = header.classList.contains('open');
            header.classList.toggle('open', !isOpen);
            body.classList.toggle('open', !isOpen);
            if (!isOpen && body.dataset.loaded === 'false') {
              cargarNivelTerciario(body, ns);
            }
          });

          item.appendChild(header);
          item.appendChild(body);
          container.appendChild(item);
        });

      } catch (err) {
        container.innerHTML = '<div class="nav-loading" style="padding-left:12px;color:var(--text-muted)">Error</div>';
        console.error('[cargarNivelesSecundarios]', err);
      }
    }

    // ═══════════════════════════════════════════════════════════
    //  NIVEL TERCIARIO DINÁMICO
    //  Si hay capitulos → muestra botones de capitulo
    //  Si no → carga sección en centro directamente
    // ═══════════════════════════════════════════════════════════
    async function cargarNivelTerciario(container, titulo) {
      container.innerHTML = '<div class="nav-loading" style="padding-left:16px">Cargando…</div>';
      container.dataset.loaded = 'true';

      try {
        const res  = await fetch(`/api/abogado?action=capitulos&pais=${enc(paisActivo)}&ley=${enc(leyActiva)}&estado=${enc(estadoActivo)}&nivel_secundario=${enc(titulo)}`);
        const json = await res.json();
        const caps = json.capitulos || [];

        container.innerHTML = '';

        if (caps.length > 0) {
          // Tiene capítulos → mostrarlos como botones hoja
          caps.forEach(cap => {
            const btn = document.createElement('button');
            btn.className = 'art-link';
            btn.style.paddingLeft = '28px';
            btn.textContent = cap;
            btn.addEventListener('click', () => {
              document.querySelectorAll('.art-link.activo').forEach(el => el.classList.remove('activo'));
              btn.classList.add('activo');
              cargarSeccionEnCentro(titulo, cap);
            });
            container.appendChild(btn);
          });
        } else {
          // Sin capítulos → cargar artículos directamente en centro
          container.innerHTML = '';
          cargarSeccionEnCentro(titulo, null);
        }

      } catch (err) {
        container.innerHTML = '<div class="nav-loading" style="padding-left:16px;color:var(--text-muted)">Error</div>';
        console.error('[cargarNivelTerciario]', err);
      }
    }

    // ═══════════════════════════════════════════════════════════
    //  SECCIÓN EN CENTRO — muestra todas las tarjetas de artículos
    // ═══════════════════════════════════════════════════════════
    async function cargarSeccionEnCentro(titulo, capitulo) {
      mostrarVistaSección();
      document.getElementById('seccion-titulo').textContent = capitulo || titulo;
      document.getElementById('seccion-articulos').innerHTML = '<div class="nav-loading">Cargando artículos…</div>';

      try {
        let url = `/api/abogado?action=articulos_capitulo&pais=${enc(paisActivo)}&ley=${enc(leyActiva)}&estado=${enc(estadoActivo)}&nivel_secundario=${enc(titulo)}`;
        if (capitulo) url += `&capitulo=${enc(capitulo)}`;
        const res  = await fetch(url);
        const json = await res.json();
        const arts = json.articulos || [];

        const contenedor = document.getElementById('seccion-articulos');
        contenedor.innerHTML = '';

        if (arts.length === 0) {
          contenedor.innerHTML = '<div class="nav-loading">Sin artículos en esta sección</div>';
          return;
        }

        // Guardar artículos del capítulo para contexto de Apolo
        capituloArticulos = arts.map(a => ({ id_unico: a.id_unico, numero_articulo: a.numero_articulo }));

        // Botón explícame al inicio
        const seccionNombre = capitulo || titulo;
        const btnExplicar = document.createElement('div');
        btnExplicar.className = 'seccion-acciones';
        const btnEl = document.createElement('button');
        btnEl.className = 'btn-accion primary';
        btnEl.textContent = '✦ Explícame esta sección';
        btnEl.addEventListener('click', () => explicarSeccion(seccionNombre, capitulo, titulo));
        btnExplicar.appendChild(btnEl);
        contenedor.appendChild(btnExplicar);

        arts.forEach(a => {
          const card = document.createElement('div');
          card.className = 'art-card';
          card.innerHTML = `
            <div class="art-card-numero">${a.numero_articulo}</div>
            <div class="art-card-preview">${(a.texto_original || '').replace(/\n/g, ' ')}</div>
          `;
          card.addEventListener('click', () => {
            loadArticulo(a.id_unico);
          });
          contenedor.appendChild(card);
        });

      } catch (err) {
        document.getElementById('seccion-articulos').innerHTML = '<div class="nav-loading">Error cargando artículos</div>';
        console.error('[cargarSeccionEnCentro]', err);
      }
    }

    // LEGACY — mantenido para compatibilidad con búsqueda
    async function cargarArticulosCapitulo(container, nivelSecundario) {
      container.innerHTML = '<div class="nav-loading" style="padding-left:16px">Cargando…</div>';
      container.dataset.loaded = 'true';

      try {
        const res  = await fetch(`/api/abogado?action=articulos_capitulo&pais=${enc(paisActivo)}&ley=${enc(leyActiva)}&estado=${enc(estadoActivo)}&nivel_secundario=${enc(nivelSecundario)}`);
        const json = await res.json();
        const arts = json.articulos || [];

        container.innerHTML = '';

        if (arts.length === 0) {
          container.innerHTML = '<div class="nav-loading" style="padding-left:16px;color:var(--text-muted)">Sin artículos</div>';
          return;
        }

        arts.forEach(a => {
          const link = document.createElement('div');
          link.className = 'art-link';
          link.textContent = a.numero_articulo;
          link.dataset.id = a.id_unico;
          link.addEventListener('click', () => {
            document.querySelectorAll('.art-link.activo').forEach(el => el.classList.remove('activo'));
            link.classList.add('activo');
            loadArticulo(a.id_unico);
          });
          container.appendChild(link);
        });

      } catch (err) {
        container.innerHTML = '<div class="nav-loading" style="padding-left:16px;color:var(--text-muted)">Error</div>';
        console.error('[cargarArticulosCapitulo]', err);
      }
    }

    // ═══════════════════════════════════════════════════════════
    //  SEARCH
    // ═══════════════════════════════════════════════════════════
    document.getElementById('inp-buscar').addEventListener('keydown', e => {
      if (e.key === 'Enter') buscarArticulo();
    });

    async function buscarArticulo() {
      const numero = document.getElementById('inp-buscar').value.trim();
      const container = document.getElementById('search-resultados');

      if (!numero || !paisActivo || !leyActiva) {
        container.innerHTML = '<div class="nav-loading" style="padding:8px 14px">Selecciona país y ley primero</div>';
        return;
      }

      container.innerHTML = '<div class="nav-loading" style="padding:8px 14px">Buscando…</div>';

      try {
        const res  = await fetch(`/api/abogado?action=buscar&pais=${enc(paisActivo)}&ley=${enc(leyActiva)}&estado=${enc(estadoActivo)}&numero=${enc(numero)}`);
        const json = await res.json();
        const resultados = json.resultados || [];

        container.innerHTML = '';
        if (resultados.length === 0) {
          container.innerHTML = '<div class="nav-loading" style="padding:8px 14px;color:var(--text-muted)">Sin resultados</div>';
          return;
        }

        const divider = document.createElement('div');
        divider.className = 'nav-divider';
        divider.style.margin = '4px 14px 6px';
        container.appendChild(divider);

        resultados.forEach(r => {
          const item = document.createElement('div');
          item.className = 'search-result-item';
          item.innerHTML = `${r.numero_articulo}<div class="search-result-sub">${r.titulo || r.libro || ''}</div>`;
          item.addEventListener('click', () => {
            document.querySelectorAll('.art-link.activo').forEach(el => el.classList.remove('activo'));
            loadArticulo(r.id_unico);
            ocultarResultadosBusqueda();
            document.getElementById('inp-buscar').value = '';
          });
          container.appendChild(item);
        });

      } catch (err) {
        container.innerHTML = '<div class="nav-loading" style="padding:8px 14px;color:var(--text-muted)">Error en búsqueda</div>';
        console.error('[buscarArticulo]', err);
      }
    }

    function ocultarResultadosBusqueda() {
      document.getElementById('search-resultados').innerHTML = '';
    }

    // ═══════════════════════════════════════════════════════════
    //  LOAD ARTICLE
    // ═══════════════════════════════════════════════════════════
    async function loadArticulo(id) {
      try {
        const res  = await fetch(`/api/abogado?action=articulo&id=${enc(id)}`);
        const json = await res.json();
        const art  = json.articulo;

        if (!art) return;

        articuloActivo = art;

        // Load sibling articles for context
        if (art.titulo) {
          try {
            const res2  = await fetch(`/api/abogado?action=articulos_capitulo&pais=${enc(art.pais||paisActivo)}&ley=${enc(art.ley)}&estado=${enc(art.estado||'')}&nivel_secundario=${enc(art.titulo)}`);
            const json2 = await res2.json();
            capituloArticulos = json2.articulos || [];
          } catch (_) {
            capituloArticulos = [];
          }
        }

        // Render article
        document.getElementById('breadcrumb').innerHTML = buildBreadcrumb(art);
        document.getElementById('art-numero').textContent = art.numero_articulo || '';
        document.getElementById('art-ley-info').textContent = `${art.ley || ''} · ${art.estado || ''}`;
        document.getElementById('art-texto').textContent = art.texto_original || art.texto || '';

        mostrarVistaArticulo();

        // Chat context
        const ctx = document.getElementById('chat-context');
        ctx.textContent = `Artículo activo: ${art.numero_articulo}`;
        ctx.classList.add('activo');

        // Reset chat with greeting
        const msgs = document.getElementById('chat-mensajes');
        msgs.innerHTML = '';
        agregarMensaje('apolo', `He cargado el <strong>${art.numero_articulo}</strong>. Puedes preguntarme sobre su contenido, implicaciones o cómo aplicarlo en casos concretos.`);

      } catch (err) {
        console.error('[loadArticulo]', err);
      }
    }

    function buildBreadcrumb(art) {
      const partes = [art.libro, art.titulo].filter(Boolean);
      if (partes.length === 0) return art.ley || '';
      return partes.map((p, i) => {
        const cls = i === partes.length - 1 ? '<span>' : '<span class="breadcrumb-sep" style="color:var(--text-muted)">';
        return i < partes.length - 1
          ? `<span>${p}</span> <span class="breadcrumb-sep">›</span>`
          : `<span>${p}</span>`;
      }).join(' ');
    }

    // ═══════════════════════════════════════════════════════════
    //  EXPLAIN SECTION — desde vista de sección (sin artículo activo)
    // ═══════════════════════════════════════════════════════════
    async function explicarSeccion(nombre, capitulo, titulo) {
      mostrarWhiteboard();
      document.getElementById('wb-titulo').textContent = nombre;
      document.getElementById('wb-frame').innerHTML = `
        <div class="wb-loading"><div class="wb-spinner"></div>Generando diagrama de flujo…</div>`;
      document.getElementById('wb-caption').textContent = 'Generando…';

      try {
        const res = await fetch('/api/diagrama', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nivel_secundario: capitulo || titulo, estado: estadoActivo, ley: leyActiva })
        });
        const json = await res.json();
        if (!json.svg) throw new Error(json.error || 'Sin SVG');
        document.getElementById('wb-frame').innerHTML = json.svg;
        const caption = document.getElementById('wb-caption');
        caption.className = 'wb-caption gold';
        caption.textContent = json.cached ? 'Diagrama en caché · APOLO' : 'Generado por APOLO';
      } catch (err) {
        document.getElementById('wb-frame').innerHTML = `<div class="wb-loading" style="color:rgba(245,237,216,0.3)">Error al generar el diagrama</div>`;
        console.error('[explicarSeccion]', err);
      }
    }

    // ═══════════════════════════════════════════════════════════
    //  EXPLAIN CHAPTER (diagrama)
    // ═══════════════════════════════════════════════════════════
    async function explicarCapitulo() {
      if (!articuloActivo) return;

      const { titulo, estado, ley } = articuloActivo;
      if (!titulo) {
        agregarMensaje('apolo', 'Este artículo no tiene capítulo asignado para generar un diagrama.');
        return;
      }

      // Show whiteboard with loading
      mostrarWhiteboard();
      document.getElementById('wb-titulo').textContent = titulo;
      document.getElementById('wb-frame').innerHTML = `
        <div class="wb-loading">
          <div class="wb-spinner"></div>
          Generando diagrama de flujo…
        </div>`;
      document.getElementById('wb-caption').className = 'wb-caption';
      document.getElementById('wb-caption').textContent = 'Generando…';

      try {
        const res  = await fetch('/api/diagrama', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nivel_secundario: titulo, estado, ley })
        });
        const json = await res.json();

        if (!json.svg) throw new Error(json.error || 'Sin SVG en respuesta');

        document.getElementById('wb-frame').innerHTML = json.svg;
        const caption = document.getElementById('wb-caption');
        caption.className = 'wb-caption gold';
        caption.textContent = json.cached ? 'Diagrama en caché · APOLO' : 'Generado por APOLO';

      } catch (err) {
        document.getElementById('wb-frame').innerHTML = `
          <div class="wb-loading" style="color:rgba(245,237,216,0.3)">
            Error al generar el diagrama
          </div>`;
        document.getElementById('wb-caption').textContent = err.message;
        console.error('[explicarCapitulo]', err);
      }
    }

    function volverAlArticulo() {
      mostrarVistaArticulo();
    }

    // ═══════════════════════════════════════════════════════════
    //  CHAT
    // ═══════════════════════════════════════════════════════════
    function chatKeydown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        enviarChat();
      }
    }

    async function enviarChat() {
      if (chatBloqueado) return;
      const input = document.getElementById('chat-input');
      const preguntaUsuario = input.value.trim();
      if (!preguntaUsuario) return;

      input.value = '';
      input.style.height = 'auto';
      chatBloqueado = true;
      document.getElementById('btn-send').disabled = true;

      agregarMensaje('usuario', preguntaUsuario);

      // Build enriched question
      let preguntaEnriquecida = preguntaUsuario;
      if (articuloActivo) {
        const extracto = (articuloActivo.texto_original || articuloActivo.texto || '').substring(0, 400);
        preguntaEnriquecida = `[Artículo activo: ${articuloActivo.numero_articulo}: ${extracto}]\n\n${preguntaUsuario}`;
      }

      // Typing indicator
      const typingId = 'typing-' + Date.now();
      agregarMensaje('apolo-typing', '', typingId);

      try {
        const body = {
          pregunta: preguntaEnriquecida,
          estado:   estadoActivo || articuloActivo?.estado || '',
          pais:     paisActivo  || articuloActivo?.pais   || 'MX',
          fuente:   leyActiva   || articuloActivo?.ley    || '',
          tema:     articuloActivo?.titulo                 || '',
          modo:     'abogado'
        };

        const res  = await fetch('/api/asesoria', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify(body)
        });
        const json = await res.json();

        eliminarMensaje(typingId);

        if (json.respuesta) {
          const html = json.respuesta.draftHtml || json.respuesta.resumen || 'Sin respuesta';
          agregarMensaje('apolo', html, null, json.respuesta.articulos || []);
        } else if (json.error) {
          agregarMensaje('apolo', `Error: ${json.error}`);
        }

      } catch (err) {
        eliminarMensaje(typingId);
        agregarMensaje('apolo', 'Error de conexión. Intenta de nuevo.');
        console.error('[enviarChat]', err);
      }

      chatBloqueado = false;
      document.getElementById('btn-send').disabled = false;
      input.focus();
    }

    function agregarMensaje(tipo, contenido, id, articulos) {
      const msgs = document.getElementById('chat-mensajes');
      const div  = document.createElement('div');
      if (id) div.id = id;

      if (tipo === 'usuario') {
        div.className = 'msg msg-usuario';
        div.innerHTML = `<div class="msg-sender">Tú</div><div>${escapeHtml(contenido)}</div>`;
      } else if (tipo === 'apolo') {
        div.className = 'msg msg-apolo';
        let inner = `<div class="msg-sender">APOLO</div><div>${contenido}</div>`;
        if (articulos && articulos.length > 0) {
          inner += `<div class="art-tags-row">${articulos.map(a => `<span class="art-tag">Art. ${a}</span>`).join('')}</div>`;
        }
        div.innerHTML = inner;
      } else if (tipo === 'apolo-typing') {
        div.className = 'msg msg-apolo';
        div.innerHTML = `<div class="msg-sender">APOLO</div><div class="typing-dots"><span></span><span></span><span></span></div>`;
      }

      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function eliminarMensaje(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    function mostrarSaludo() {
      agregarMensaje('apolo', 'Hola. Soy <strong>APOLO</strong>, tu asistente jurídico Pro. Selecciona un artículo del navegador para comenzar el análisis.');
    }

    // ═══════════════════════════════════════════════════════════
    //  VIEW SWITCHING
    // ═══════════════════════════════════════════════════════════
    function ocultarTodo() {
      document.getElementById('centro-vacio').style.display   = 'none';
      document.getElementById('articulo-vista').style.display = 'none';
      document.getElementById('seccion-vista').style.display  = 'none';
      document.getElementById('whiteboard').style.display     = 'none';
    }

    function mostrarVistaArticulo() {
      ocultarTodo();
      document.getElementById('articulo-vista').style.display = 'block';
    }

    function mostrarVistaSección() {
      ocultarTodo();
      document.getElementById('seccion-vista').style.display = 'block';
    }

    function mostrarWhiteboard() {
      ocultarTodo();
      document.getElementById('whiteboard').style.display = 'block';
    }

    function limpiarArbol() {
      document.getElementById('arbol').innerHTML = '<div class="nav-placeholder">Selecciona un país<br>y una ley</div>';
    }

    // ═══════════════════════════════════════════════════════════
    //  BOOKMARKS (localStorage)
    // ═══════════════════════════════════════════════════════════
    const BM_KEY = 'legalatlas_bookmarks_v1';

    function getBookmarks() {
      try { return JSON.parse(localStorage.getItem(BM_KEY) || '[]'); } catch { return []; }
    }
    function saveBookmarks(list) {
      localStorage.setItem(BM_KEY, JSON.stringify(list));
    }

    function bookmarkId() {
      return [paisActivo, leyActiva, estadoActivo].filter(Boolean).join('|');
    }

    function isBookmarked() {
      const id = bookmarkId();
      return getBookmarks().some(b => b.id === id);
    }

    function actualizarBookmarkBtn() {
      const btn = document.getElementById('btn-bookmark');
      if (!paisActivo || !leyActiva) { btn.style.display = 'none'; return; }
      btn.style.display = 'flex';
      btn.textContent = isBookmarked() ? '★' : '☆';
      btn.classList.toggle('guardado', isBookmarked());
    }

    function toggleBookmark() {
      const id    = bookmarkId();
      const lista = getBookmarks();
      const idx   = lista.findIndex(b => b.id === id);
      if (idx >= 0) {
        lista.splice(idx, 1);
      } else {
        const dn = new Intl.DisplayNames(['es'], { type: 'region' });
        let label = '';
        try { label = dn.of(paisActivo); } catch { label = paisActivo; }
        label += ' · ' + leyActiva;
        if (estadoActivo) label += ' · ' + estadoActivo;
        lista.unshift({ id, pais: paisActivo, ley: leyActiva, estado: estadoActivo, label });
      }
      saveBookmarks(lista);
      actualizarBookmarkBtn();
      renderBookmarks();
    }

    function renderBookmarks() {
      const lista   = getBookmarks();
      const section = document.getElementById('bookmarks-section');
      const container = document.getElementById('bookmarks-list');
      if (lista.length === 0) { section.style.display = 'none'; return; }
      section.style.display = 'block';
      container.innerHTML = '';
      lista.forEach(b => {
        const chip = document.createElement('div');
        chip.className = 'bookmark-chip';
        chip.innerHTML = `
          <span class="bookmark-chip-label">${escapeHtml(b.label)}</span>
          <button class="bookmark-chip-del" title="Eliminar" onclick="eliminarBookmark('${escapeHtml(b.id)}');event.stopPropagation()">✕</button>`;
        chip.addEventListener('click', () => aplicarBookmark(b));
        container.appendChild(chip);
      });
    }

    function eliminarBookmark(id) {
      const lista = getBookmarks().filter(b => b.id !== id);
      saveBookmarks(lista);
      renderBookmarks();
      actualizarBookmarkBtn();
    }

    async function aplicarBookmark(b) {
      // Set selects without triggering full cascade manually
      const selPais   = document.getElementById('sel-pais');
      const selLey    = document.getElementById('sel-ley');
      const selEstado = document.getElementById('sel-estado');

      // Set pais
      selPais.value = b.pais;
      paisActivo    = b.pais;

      // Load leyes for this pais
      selLey.innerHTML = '<option value="">Cargando…</option>';
      selLey.disabled  = true;
      const dn = new Intl.DisplayNames(['es'], { type: 'region' });
      try {
        const res  = await fetch(`/api/abogado?action=leyes&pais=${enc(b.pais)}`);
        const json = await res.json();
        selLey.innerHTML = '<option value="">— Selecciona ley —</option>';
        (json.leyes || []).forEach(l => {
          const opt = document.createElement('option');
          opt.value = l; opt.textContent = l;
          selLey.appendChild(opt);
        });
        selLey.disabled = false;
        selLey.value    = b.ley;
        selLey.onchange = onLeyChange;
      } catch (err) { console.error('[aplicarBookmark]', err); }

      leyActiva = b.ley;

      // Handle estado
      const grupoEst = document.getElementById('grupo-estado');
      if (b.estado) {
        try {
          const res  = await fetch(`/api/abogado?action=estados_por_ley&pais=${enc(b.pais)}&ley=${enc(b.ley)}`);
          const json = await res.json();
          selEstado.innerHTML = '<option value="">Todos los estados…</option>';
          (json.estados || []).forEach(e => {
            const opt = document.createElement('option');
            opt.value = e; opt.textContent = e;
            selEstado.appendChild(opt);
          });
          grupoEst.style.display = 'block';
          selEstado.value  = b.estado;
          selEstado.onchange = onEstadoChange;
        } catch (err) { console.warn('[aplicarBookmark estados]', err); }
        estadoActivo = b.estado;
      } else {
        grupoEst.style.display = 'none';
        estadoActivo = '';
      }

      actualizarBookmarkBtn();
      limpiarArbol();
      ocultarResultadosBusqueda();
      await cargarNivelesPrimarios();
    }

    // ═══════════════════════════════════════════════════════════
    //  UTILS
    // ═══════════════════════════════════════════════════════════
    function enc(val) { return encodeURIComponent(val || ''); }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>

</body>
